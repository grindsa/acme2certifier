name: 'Dump Secrets to JSON'
description: 'Dumps a list of secrets into a JSON structure with secret names as keys and content as values'

inputs:
  secret_names:
    description: 'Comma-separated list of secret names to dump'
    required: true
  output_file:
    description: 'Output file path for the JSON structure'
    required: false
    default: 'secrets.json'
  mask_values:
    description: 'Whether to mask secret values in logs (true/false)'
    required: false
    default: 'true'

outputs:
  json_file:
    description: 'Path to the generated JSON file'
    value: ${{ steps.create-json.outputs.json_file }}
  secret_count:
    description: 'Number of secrets processed'
    value: ${{ steps.create-json.outputs.secret_count }}

runs:
  using: 'composite'
  steps:
    - name: Create secrets JSON
      id: create-json
      shell: bash
      env:
        SECRET_NAMES: ${{ inputs.secret_names }}
        OUTPUT_FILE: ${{ inputs.output_file }}
        MASK_VALUES: ${{ inputs.mask_values }}
        ALL_SECRETS_JSON: ${{ env.ALL_SECRETS_JSON }}
      run: |
        # Initialize JSON object
        echo "{" > "$OUTPUT_FILE"

        # Convert comma-separated list to array
        IFS=',' read -ra SECRETS <<< "$SECRET_NAMES"
        secret_count=0
        total_secrets=${#SECRETS[@]}
        first_entry=true

        mask_values_lower=$(printf '%s' "$MASK_VALUES" | tr '[:upper:]' '[:lower:]')

        echo "Processing $total_secrets secrets..."

        for secret_item in "${SECRETS[@]}"; do
          secret_name=$(echo "$secret_item" | xargs)  # Trim whitespace

          if [ -z "$secret_name" ]; then
            continue
          fi

          echo "🔍 Processing secret: $secret_name"
          secret_count=$((secret_count + 1))

          secret_found=false
          secret_value=""

          # Preferred: resolve from a JSON snapshot of GitHub secrets passed by workflow env
          if [ -n "$ALL_SECRETS_JSON" ] && command -v jq >/dev/null 2>&1; then
            if echo "$ALL_SECRETS_JSON" | jq -e --arg k "$secret_name" 'has($k)' >/dev/null 2>&1; then
              secret_value=$(echo "$ALL_SECRETS_JSON" | jq -r --arg k "$secret_name" '.[$k]')
              secret_found=true
            fi
          fi

          # Fallback: resolve from step env var with matching secret name
          if [ "$secret_found" = false ] && [[ -v $secret_name ]]; then
            secret_value="${!secret_name}"
            secret_found=true
          fi

          # Escape JSON value safely (supports multiline values)
          escaped_value=$(printf '%s' "$secret_value" | python3 -c 'import json, sys; print(json.dumps(sys.stdin.read()))')

          if [ "$secret_found" = true ] && [ -n "$secret_value" ]; then
            # Add comma if not the first entry
            if [ "$first_entry" = false ]; then
              echo "," >> "$OUTPUT_FILE"
            fi

            # Add the key-value pair
            echo -n "  \"$secret_name\": $escaped_value" >> "$OUTPUT_FILE"
            first_entry=false

            if [ "$mask_values_lower" = "true" ]; then
              echo "✓ Added secret: $secret_name (value masked)"
            else
              echo "✓ Added secret: $secret_name"
            fi
          else
            echo "⚠️  Warning: Secret '$secret_name' is empty or not found"

            # Add comma if not the first entry
            if [ "$first_entry" = false ]; then
              echo "," >> "$OUTPUT_FILE"
            fi

            # Add null value for missing secrets
            echo -n "  \"$secret_name\": null" >> "$OUTPUT_FILE"
            first_entry=false
          fi
        done

        # Close JSON object
        echo "" >> "$OUTPUT_FILE"
        echo "}" >> "$OUTPUT_FILE"

        echo "json_file=$OUTPUT_FILE" >> $GITHUB_OUTPUT
        echo "secret_count=$secret_count" >> $GITHUB_OUTPUT

        echo "JSON file created: $OUTPUT_FILE"
        echo "Secrets processed: $secret_count"

        # Show file size
        file_size=$(wc -c < "$OUTPUT_FILE")
        echo "File size: $file_size bytes"

        # Validate JSON syntax
        if command -v jq >/dev/null 2>&1; then
          if jq empty "$OUTPUT_FILE" 2>/dev/null; then
            echo "✓ JSON syntax is valid"
          else
            echo "❌ JSON syntax is invalid"
            exit 1
          fi
        elif command -v python3 >/dev/null 2>&1; then
          if python3 -m json.tool "$OUTPUT_FILE" >/dev/null 2>&1; then
            echo "✓ JSON syntax is valid"
          else
            echo "❌ JSON syntax is invalid"
            exit 1
          fi
        else
          echo "⚠️  Neither jq nor python3 is available, skipping JSON validation"
        fi
