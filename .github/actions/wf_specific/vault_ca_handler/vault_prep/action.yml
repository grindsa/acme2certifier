name: "vault_prep"
description: "vault_prep"
inputs:
  RUNNER_IP:
    description: "Runner IP"
    required: true
  WORKING_DIR:
    description: "Working directory"
    required: true
    default: ${{ github.workspace }}
  ISSUING_CA_KEY:
    description: "Path to the Issuing-CA private key"
    required: true
    default: "test/ca/sub-ca-key.pem"
  ISSUING_CA_CERT:
    description: "Path to the CA certificate"
    required: true
    default: "test/ca/sub-ca-cert.pem"
  ISSUING_CA_PASSPHRASE:
    description: "Passphrase for the private key"
    required: true
    default: "Test1234"
  ROOT_CA_CERT:
    description: "Path to the root CA certificate"
    required: true
    default: "test/ca/root-ca-cert.pem"

outputs:
  VAULT_TOKEN:
    description: "Vault Token"
    value: ${{ env.VAULT_TOKEN }}

runs:
  using: "composite"
  steps:
  - name: "Prepare Environment"
    working-directory: ${{ inputs.WORKING_DIR }}
    run: |
      sudo apt-get update
      sudo apt-get install -y docker-compose
      docker network create acme
      mkdir -p data/vault
      sudo chmod -R 777 data/vault
      sudo sh -c "echo '$VAULT_IP vault' >> /etc/hosts"
      cp vault/compose.yaml data/vault/docker-compose.yaml
    env:
      VAULT_IP: ${{ inputs.RUNNER_IP }}
    shell: bash

  - name: "Generate Certificates"
    run: |
      mkdir -p $WORKING_DIR/data/vault/certs
      openssl req -nodes -newkey rsa:2048 -keyout $WORKING_DIR/data/vault/certs/server.key -out $WORKING_DIR/data/vault/certs/server.csr -batch -subj "/CN=vault.acme" -addext "subjectAltName=DNS:vault.acme" -addext "keyUsage = digitalSignature, keyEncipherment, dataEncipherment" -addext "extendedKeyUsage = serverAuth" -addext "basicConstraints=CA:false"
      openssl x509 -req -in $WORKING_DIR/data/vault/certs/server.csr -CA $ISSUING_CA_CERT -CAkey $ISSUING_CA_KEY -CAcreateserial -out $WORKING_DIR/data/vault/certs/server.crt -copy_extensions copy -days 30 -sha256 --passin pass:$ISSUING_CA_PASSPHRASE
      cat $ISSUING_CA_CERT >> $WORKING_DIR/data/vault/certs/server.csr
      cat $ROOT_CA_CERT >> $WORKING_DIR/data/vault/certs/server.csr
      sudo chmod 777 $WORKING_DIR/data/vault/*
    shell: bash
    env:
      WORKING_DIR: ${{ inputs.WORKING_DIR }}
      ISSUING_CA_CERT: ${{ inputs.ISSUING_CA_CERT }}
      ISSUING_CA_KEY: ${{ inputs.ISSUING_CA_KEY }}
      ISSUING_CA_PASSPHRASE: ${{ inputs.ISSUING_CA_PASSPHRASE }}
      ROOT_CA_CERT: ${{ inputs.ROOT_CA_CERT }}

  - name: "Instanciate vault server"
    working-directory: ${{ inputs.WORKING_DIR }}/data/vault
    run: |
      docker-compose up -d
    shell: bash

  - name: "Sleep for 10s"
    uses: juliangruber/sleep-action@v2.0.3
    with:
      time: 10s

  - name: "Configure vault server"
    working-directory: ${{ inputs.WORKING_DIR }}/data/vault
    run: |
      docker ps -a
      exit 1
    shell: bash


  - name: "Get randmonly generated Superadmin password for ejbca instance"
    run: |
      echo SAEC=$(docker logs ejbca | grep /opt/keyfactor/bin/start.sh | grep Password: | awk -F'Password: ' '{print $2}' | awk -F ' ' '{print $1}') >> $GITHUB_ENV
    shell: bash

  - run: echo "Randmonly generated Superadmin password is ${{ env.SAEC }}"
    shell: bash

  - run: sudo echo  ${{ env.SAEC }} >  ${{ inputs.WORKING_DIR }}/data/passphrase.txt
    shell: bash

  - name: "Configure ejbca"
    run: |
      docker exec -i ejbca bin/ejbca.sh ca getcacert --caname ManagementCA -f /tmp/store/acme_ca/ca_bundle.pem
      docker exec -i ejbca bin/ejbca.sh config protocols enable --name "REST Certificate Management"
      docker exec -i ejbca bin/ejbca.sh config protocols enable --name "REST Certificate Management V2"
      docker exec -i ejbca bin/ejbca.sh ca init acmeca "CN=acmeca" soft foo123 4096 RSA -v 365 --policy 2.5.29.32.0 -s SHA256WithRSA
    shell: bash

  - name: "Get CAID"
    run: |
      echo CAID=$(docker logs ejbca | grep "msg=CA with id" | grep "and name acmeca added" | awk -F'with id ' '{print $2}' | awk -F' and name' '{print $1}') >> $GITHUB_ENV
    shell: bash

  - run: echo "CAID of acmeca is ${{ env.CAID }}"
    shell: bash

  - name: "Create subca"
    run: |
      docker exec -i ejbca bin/ejbca.sh ca init acmesubca "CN=acmesubca" soft foo123 4096 RSA -v 365 --policy 2.5.29.32.0 -s SHA256WithRSA --signedby $CAID
      docker exec -i ejbca bin/ejbca.sh ca importprofiles -d /tmp/data/
    env:
      CAID: ${{ env.CAID }}
    shell: bash

  - name: "Sleep for 10s"
    uses: juliangruber/sleep-action@v2.0.3
    with:
      time: 10s

  - name: "Fetch superadmin certificate and key"
    working-directory: ${{ inputs.WORKING_DIR }}
    run: |
      docker exec -i ejbca bin/ejbca.sh ra setendentitystatus superadmin 10
      docker exec -i ejbca bin/ejbca.sh ra setclearpwd superadmin $SAEC
      docker exec -i ejbca bin/ejbca.sh batch
      docker cp ejbca:/opt/keyfactor/p12/superadmin.p12 data/acme_ca/
    env:
      SAEC: ${{ env.SAEC }}
    shell: bash

  - name: "Test superadmin  certificate and key"
    working-directory: ${{ inputs.WORKING_DIR }}
    run: |
      curl https://127.0.0.1/ejbca/ejbca-rest-api/v1/certificate/status --cert-type P12 --cert data/acme_ca/superadmin.p12:$SAEC --insecure
      curl https://ejbca/ejbca/ejbca-rest-api/v1/certificate/status --cert-type P12 --cert data/acme_ca/superadmin.p12:$SAEC --cacert data/acme_ca/ca_bundle.pem
    env:
      SAEC: ${{ env.SAEC }}
    shell: bash
