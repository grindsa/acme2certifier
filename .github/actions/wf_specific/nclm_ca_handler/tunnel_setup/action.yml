name: "tunnel_setup"
description: "tunnel_setup"
inputs:
  SSH_KEY:
    description: "SSH access key"
    required: true
  SSH_KNOWN_HOSTS:
    description: "SSH known hosts"
    required: true
  SSH_USER:
    description: "SSH user"
    required: true
  SSH_HOST:
    description: "SSH host"
    required: true
  SSH_PORT:
    description: "SSH port"
    required: true
  NAME_SPACE:
    description: "namespace"
    required: true
    default: "acme"
  NCLM_API_HOST:
    description: "NCLM API host"
    required: true
  NCLM_API_USER:
    description: "NCLM API user"
    required: true
  NCLM_API_PASSWORD:
    description: "NCLM API password"
    required: true
runs:
  using: "composite"
  steps:
  - name: "Prepare ssh environment on ramdisk "
    run: |
      sudo mkdir -p /tmp/rd
      sudo mount -t tmpfs -o size=5M none /tmp/rd
      sudo echo "$SSH_KEY" > /tmp/rd/ak.tmp
      sudo chmod 600 /tmp/rd/ak.tmp
      sudo echo "$KNOWN_HOSTS" > /tmp/rd/known_hosts
    env:
      SSH_KEY: ${{ inputs.SSH_KEY }}
      KNOWN_HOSTS: ${{ inputs.SSH_KNOWN_HOSTS }}
    shell: bash

  - name: "Setup ssh forwarder"
    run: |
        docker run -d --rm --network $NAME_SPACE --name=forwarder  -e "MAPPINGS=4000:$NCLM_API_HOST:4000" -e "SSH_HOST=$SSH_HOST" -e "SSH_PORT=$SSH_PORT" -e "SSH_USER=$SSH_USER" -p 4000:4000 -v "/tmp/rd/ak.tmp:/ssh_key:ro" davidlor/ssh-port-forward-client:dev
    env:
      SSH_USER: ${{ inputs.SSH_USER }}
      SSH_HOST: ${{ inputs.SSH_HOST }}
      SSH_PORT: ${{ inputs.SSH_PORT }}
      NAME_SPACE: ${{ inputs.NAME_SPACE }}
      NCLM_API_HOST: '10.0.0.53' # ${{ inputs.NCLM_API_HOST }}
    shell: bash

  - name: "Sleep for 5s"
    uses: juliangruber/sleep-action@v2.0.3
    with:
      time: 5s

  - name: "Test conection to mscertsrv via ssh tunnel"
    run: |
      docker run -i --rm --network $NAME_SPACE curlimages/curl --insecure https://forwarder.acme:4000
    env:
      NCLM_API_HOST: ${{ inputs.NCLM_API_HOST }}
      NAME_SPACE: ${{ inputs.NAME_SPACE }}
      NCLM_API_USER: ${{ inputs.NCLM_API_USER }}
      NCLM_API_PASSWORD: ${{ inputs.NCLM_API_PASSWORD }}
    shell: bash
