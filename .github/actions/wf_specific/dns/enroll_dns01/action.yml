name: "enroll_dns01 "
description: "enroll_dns01"

inputs:
  DEPLOYMENT_TYPE:
    description: "Deployment type"
    required: true
    default: "rpm"
  CA_PATH:
    description: "Path to CA certificates"
    required: false
    default: "data/volume/acme_ca/"
  ACME_SRV:
    description: "ACME server URL"
    required: false
    default: "acme-srv"
  NAME_SPACE:
    description: "Kubernetes namespace"
    required: false
    default: "acme"
  WILDCARD_EXPECT_FAIL:
    description: "Whether wildcard enrollments are expected to fail"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
  - name: "Sleep for 10s"
    uses: juliangruber/sleep-action@v2.0.4
    with:
      time: 10s

  - name: "Test http://acme-srv/directory is accessible"
    run: docker run -i --rm --network $NAME_SPACE curlimages/curl -f http://$ACME_SRV.$NAME_SPACE/directory
    shell: bash
    env:
      ACME_SRV: ${{ inputs.ACME_SRV }}
      NAME_SPACE: ${{ inputs.NAME_SPACE }}

  - name: "Test if https://acme-srv/directory is accessible"
    run: docker run -i --rm --network $NAME_SPACE curlimages/curl --insecure -f https://$ACME_SRV.$NAME_SPACE/directory
    shell: bash
    env:
      ACME_SRV: ${{ inputs.ACME_SRV }}
      NAME_SPACE: ${{ inputs.NAME_SPACE }}

  - name: "Enroll acme.sh - single domain"
    run: |
      docker exec -i acme-sh acme.sh --dnssleep 10 --server http://$ACME_SRV.$NAME_SPACE --accountemail 'acme-sh@example.com' --issue --dns dns_test -d acme-sh.single --standalone --debug 3 --output-insecure --force
      openssl verify -CAfile $CA_PATH/root-ca-cert.pem -untrusted $CA_PATH/sub-ca-cert.pem acme-sh/acme-sh.single_ecc/acme-sh.single.cer
    shell: bash
    env:
      CA_PATH: ${{ inputs.CA_PATH }}
      ACME_SRV: ${{ inputs.ACME_SRV }}
      NAME_SPACE: ${{ inputs.NAME_SPACE }}

  - name: "Enroll acme.sh - two domains"
    run: |
      docker exec -i acme-sh acme.sh --dnssleep 10 --server http://$ACME_SRV.$NAME_SPACE --accountemail 'acme-sh@example.com' --issue --dns dns_test -d acme-sh.first --dns dns_test -d acme-sh.second --standalone --debug 3 --output-insecure --force
      openssl verify -CAfile $CA_PATH/root-ca-cert.pem -untrusted $CA_PATH/sub-ca-cert.pem acme-sh/acme-sh.first_ecc/acme-sh.first.cer
    shell: bash
    env:
      CA_PATH: ${{ inputs.CA_PATH }}
      ACME_SRV: ${{ inputs.ACME_SRV }}
      NAME_SPACE: ${{ inputs.NAME_SPACE }}

  - name: "Enroll acme.sh - single wildcard domain"
    run: |
      if [ "$WILDCARD_EXPECT_FAIL" = "true" ]; then
        set +e
        docker exec -i acme-sh acme.sh --dnssleep 10 --server http://$ACME_SRV.$NAME_SPACE --accountemail 'acme-sh@example.com' --issue --dns dns_test -d '*.acme-sh.wildcard' --standalone --debug 3 --output-insecure --force  # NOSONAR
        exit_code=$?
        set -e
        if [ "$exit_code" -eq 0 ]; then
          echo "Expected wildcard enrollment to fail, but it succeeded"
          exit 1
        fi
      else
        docker exec -i acme-sh acme.sh --dnssleep 10 --server http://$ACME_SRV.$NAME_SPACE --accountemail 'acme-sh@example.com' --issue --dns dns_test -d '*.acme-sh.wildcard' --standalone --debug 3 --output-insecure --force  # NOSONAR
        openssl verify -CAfile $CA_PATH/root-ca-cert.pem -untrusted $CA_PATH/sub-ca-cert.pem acme-sh/*acme-sh.wildcard_ecc/*acme-sh.wildcard.cer
      fi
    shell: bash
    env:
      CA_PATH: ${{ inputs.CA_PATH }}
      ACME_SRV: ${{ inputs.ACME_SRV }}
      NAME_SPACE: ${{ inputs.NAME_SPACE }}
      WILDCARD_EXPECT_FAIL: ${{ inputs.WILDCARD_EXPECT_FAIL }}

  - name: "Enroll acme.sh - double wildcard domain"
    run: |
      if [ "$WILDCARD_EXPECT_FAIL" = "true" ]; then
        set +e
        docker exec -i acme-sh acme.sh --dnssleep 10 --server http://$ACME_SRV.$NAME_SPACE --accountemail 'acme-sh@example.com' --issue --dns dns_test -d '*.acme-sh.first-wildcard' --dns dns_test -d '*.acme-sh.second-wildcard' --standalone --debug 3 --output-insecure --force  # NOSONAR
        exit_code=$?
        set -e
        if [ "$exit_code" -eq 0 ]; then
          echo "Expected wildcard enrollment to fail, but it succeeded"
          exit 1
        fi
      else
        docker exec -i acme-sh acme.sh --dnssleep 10 --server http://$ACME_SRV.$NAME_SPACE --accountemail 'acme-sh@example.com' --issue --dns dns_test -d '*.acme-sh.first-wildcard' --dns dns_test -d '*.acme-sh.second-wildcard' --standalone --debug 3 --output-insecure --force  # NOSONAR
        openssl verify -CAfile $CA_PATH/root-ca-cert.pem -untrusted $CA_PATH/sub-ca-cert.pem acme-sh/*.acme-sh.first-wildcard_ecc/*.acme-sh.first-wildcard.cer
      fi
    shell: bash
    env:
      CA_PATH: ${{ inputs.CA_PATH }}
      ACME_SRV: ${{ inputs.ACME_SRV }}
      NAME_SPACE: ${{ inputs.NAME_SPACE }}
      WILDCARD_EXPECT_FAIL: ${{ inputs.WILDCARD_EXPECT_FAIL }}

  - name: "Enroll acme.sh - domain and wildcard domain"
    run: |
      if [ "$WILDCARD_EXPECT_FAIL" = "true" ]; then
        set +e
        docker exec -i acme-sh acme.sh --dnssleep 10 --server http://$ACME_SRV.$NAME_SPACE --accountemail 'acme-sh@example.com' --issue --dns dns_test -d acme-sh.fqdn-wildcard --dns dns_test -d '*.acme-sh.fqdn-wildcard' --standalone --debug 3 --output-insecure --force  # NOSONAR
        exit_code=$?
        set -e
        if [ "$exit_code" -eq 0 ]; then
          echo "Expected wildcard enrollment to fail, but it succeeded"
          exit 1
        fi
      else
        docker exec -i acme-sh acme.sh --dnssleep 10 --server http://$ACME_SRV.$NAME_SPACE --accountemail 'acme-sh@example.com' --issue --dns dns_test -d acme-sh.fqdn-wildcard --dns dns_test -d '*.acme-sh.fqdn-wildcard' --standalone --debug 3 --output-insecure --force  # NOSONAR
        openssl verify -CAfile $CA_PATH/root-ca-cert.pem -untrusted $CA_PATH/sub-ca-cert.pem acme-sh/acme-sh.fqdn-wildcard_ecc/acme-sh.fqdn-wildcard.cer
      fi
    shell: bash
    env:
      CA_PATH: ${{ inputs.CA_PATH }}
      ACME_SRV: ${{ inputs.ACME_SRV }}
      NAME_SPACE: ${{ inputs.NAME_SPACE }}
      WILDCARD_EXPECT_FAIL: ${{ inputs.WILDCARD_EXPECT_FAIL }}

  - name: "Check TXT record exists"
    if: ${{ failure() }}
    run: |
      docker exec -i acme-sh ps -a
      docker exec -i acme-sh netstat -anu
      dig -t TXT _acme-challenge.acme-sh.single @$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' acme-sh)
      dig -t TXT _acme-challenge.acme-sh.first @$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' acme-sh)
      dig -t TXT _acme-challenge.acme-sh.second @$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' acme-sh)
      dig -t TXT _acme-challenge.acme-sh.wildcard @$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' acme-sh)
      dig -t TXT _acme-challenge.acme-sh.first-wildcard @$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' acme-sh)
      dig -t TXT _acme-challenge.acme-sh.second-wildcard @$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' acme-sh)
    shell: bash
