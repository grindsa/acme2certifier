name: Feature Tests - EAB
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run the workflow on'
        required: true
        default: 'main'
      run_id:
        description: 'Run ID of the producing workflow'
        required: true
        default: '0'
      sha:
        description: 'SHA of the commit to run the workflow on'
        required: true
        default: ''
      called_by_workflow:
        description: 'Name of the producing workflow'
        required: true
        default: 'manual-trigger'
      full_ref:
        description: 'Full git ref of the commit to run the workflow on'
        required: false
        default: ''

jobs:

  # ---------------------------------------------------------
  # Quick guard to validate incoming payload
  # ---------------------------------------------------------
  guard:
    runs-on: ubuntu-latest
    if: ${{ inputs.sha != '' && inputs.run_id != '' && inputs.branch != '' && github.repository == 'grindsa/acme2certifier' }}
    steps:
      - run: |
          echo "Triggered by SHA:    $SHA"
          echo "From branch:         $BRANCH"
          echo "Producer run_id:     $RUN_ID"
        env:
          SHA: ${{ inputs.sha }}
          BRANCH: ${{ inputs.branch }}
          RUN_ID: ${{ inputs.run_id }}

  # ---------------------------------------------------------
  # Test container images (matrix from payload)
  # ---------------------------------------------------------
  test-containers:
    needs: guard
    runs-on: ubuntu-latest
    if: github.repository == 'grindsa/acme2certifier'
    strategy:
      fail-fast: false
      matrix:
        websrv: ['apache2', 'nginx']
        dbhandler: ['wsgi', 'django']

    steps:
      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: "Parse XCA configuration from JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.XCA_CFG }}

      - name: "Download and import container"
        uses: ./.github/actions/container_load
        with:
          RUN_ID: ${{ inputs.run_id }}
          ARTIFACT_NAME: a2c-${{ inputs.run_id }}.${{ matrix.websrv }}.${{ matrix.dbhandler }}.tar
          DESTINATION_PATH: /tmp
          TOKEN: ${{ secrets.GH_WF_TOKEN }}
          REPO: ${{ github.repository }}

      - name: "Prepare container environment"
        uses: ./.github/actions/container_prep
        with:
          DB_HANDLER: ${{ matrix.dbhandler }}
          WEB_SRV: ${{ matrix.websrv }}
          CONTAINER_BUILD: false
          NAME_SPACE: acme

      - name: "Create letsencrypt folder"
        run: |
          mkdir -p certbot
          mkdir -p lego
          mkdir -p acme-sh

      - name: "Setup openssl ca_handler"
        run: |
          sudo mkdir -p examples/Docker/data/acme_ca/certs
          sudo cp test/ca/sub-ca-key.pem test/ca/sub-ca-crl.pem test/ca/sub-ca-cert.pem test/ca/root-ca-cert.pem examples/Docker/data/acme_ca/
          sudo cp examples/eab_handler/key_file.json examples/Docker/data/acme_ca
          sudo cp .github/openssl_ca_handler.py_acme_srv_choosen_handler.cfg examples/Docker/data/acme_srv.cfg
          sudo chmod 777 examples/Docker/data/acme_srv.cfg
          sudo echo -e "\n\n[EABhandler]" >> examples/Docker/data/acme_srv.cfg
          sudo echo "eab_handler_file: /var/www/acme2certifier/examples/eab_handler/json_handler.py" >> examples/Docker/data/acme_srv.cfg
          sudo echo "key_file: /var/www/acme2certifier/volume/acme_ca/key_file.json" >> examples/Docker/data/acme_srv.cfg

      - name: "Bring up a2c container"
        uses: ./.github/actions/container_up
        with:
          DB_HANDLER: ${{ matrix.dbhandler }}
          WEB_SRV: ${{ matrix.websrv }}

      - name: "Assert strict EAB mode via directory metadata"
        uses: ./.github/actions/wf_specific/eab/assert_directory_eab_required
        with:
          EXPECTED_VALUE: "true"

      - name: "Register without eab-credentials - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_wo_credentials
        with:
          DEPLOYMENT_TYPE: "container"

      - name: "Register with unknown eab-credentials - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_unknown_credentials
        with:
          EAB_KEY_ID: "unknown_key_id"
          EAB_KEY_SECRET: "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
          DEPLOYMENT_TYPE: "container"

      - name: "Register with wrong eab-credentials - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_wrong_credentials
        with:
          EAB_KEY_ID: "keyid_01"
          EAB_KEY_SECRET: "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
          DEPLOYMENT_TYPE: "container"

      - name: "Enroll tests"
        uses: ./.github/actions/wf_specific/eab/enroll_eab
        with:
          DEPLOYMENT_TYPE: "container"
          DATA_DIR: "examples/Docker/data"

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "Switch to non-strict mode"
        run: |
          sudo echo "eab_strict_mode: False" >> examples/Docker/data/acme_srv.cfg
          sudo echo "eab_profiling: False" >> examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/eabkid_check_disable/unknown/g" examples/Docker/data/acme_srv.cfg
          sudo cp examples/eab_handler/key_file.json examples/Docker/data/acme_ca

      - name: "Restart services after non-strict config change"
        run: |
          cd examples/Docker
          docker compose restart

      - name: "Assert non-strict EAB mode via directory metadata"
        uses: ./.github/actions/wf_specific/eab/assert_directory_eab_required
        with:
          EXPECTED_VALUE: "false"

      - name: "Register without eab-credentials - should succeed"
        uses: ./.github/actions/wf_specific/eab/enroll_wo_credentials_success

      - name: "Register with unknown eab-credentials in non-strict mode - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_unknown_credentials
        with:
          EAB_KEY_ID: "unknown_key_id"
          EAB_KEY_SECRET: "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
          DEPLOYMENT_TYPE: "container"

      - name: "Register with wrong eab-credentials in non-strict mode - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_wrong_credentials
        with:
          EAB_KEY_ID: "keyid_01"
          EAB_KEY_SECRET: "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
          DEPLOYMENT_TYPE: "container"

      - name: "Enroll tests"
        uses: ./.github/actions/wf_specific/eab/enroll_eab
        with:
          DEPLOYMENT_TYPE: "container"
          DATA_DIR: "examples/Docker/data"

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "Switch back to strict mode (no EAB profiling)"
        run: |
          sudo sed -i "s/eab_strict_mode: False/eab_strict_mode: True/g" examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/eabkid_check_disable/unknown-2/g" examples/Docker/data/acme_srv.cfg
          sudo cp examples/eab_handler/key_file.json examples/Docker/data/acme_ca

      - name: "Restart services after strict-mode config change"
        run: |
          cd examples/Docker
          docker compose restart

      - name: "Assert strict EAB mode via directory metadata"
        uses: ./.github/actions/wf_specific/eab/assert_directory_eab_required
        with:
          EXPECTED_VALUE: "true"

      - name: "Register without eab-credentials in strict mode - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_wo_credentials
        with:
           DEPLOYMENT_TYPE: "container"

      - name: "Register with unknown eab-credentials in strict mode - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_unknown_credentials
        with:
          EAB_KEY_ID: "unknown_key_id"
          EAB_KEY_SECRET: "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
          DEPLOYMENT_TYPE: "container"

      - name: "Register with wrong eab-credentials in strict mode - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_wrong_credentials
        with:
          EAB_KEY_ID: "keyid_01"
          EAB_KEY_SECRET: "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
          DEPLOYMENT_TYPE: "container"

      - name: "Enroll tests"
        uses: ./.github/actions/wf_specific/eab/enroll_eab
        with:
          DEPLOYMENT_TYPE: "container"
          DATA_DIR: "examples/Docker/data"

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "Switch to non-strict mode with EAB profiling and wildcard disabled"
        run: |
          sudo sed -i "s/eab_strict_mode: True/eab_strict_mode: False/g" examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/eab_profiling: False/eab_profiling: True/g" examples/Docker/data/acme_srv.cfg
          sudo sed -i "s#eab_handler_file: .*json_handler.py#eab_handler_file: /var/www/acme2certifier/examples/eab_handler/kid_profile_handler.py#g" examples/Docker/data/acme_srv.cfg
          sudo chmod a+rw examples/Docker/data/acme_ca/key_file.json
          sudo cat > examples/Docker/data/acme_ca/key_file.json << 'EOF'
          {
            "keyid_00": {
              "hmac": "V2VfbmVlZF9hbm90aGVyX3ZlcnkfX2xvbmdfaG1hY190b19jaGVja19lYWJfZm9yX2tleWlkXzAwX2FzX2xlZ29fZW5mb3JjZXNfYW5faG1hY19sb25nZXJfdGhhbl8yNTZfYml0cw",
              "order": {
                "wildcard_certificate_disable": false
              },
              "authorization": {
                "prevalidated_domainlist": ["lego-00.acme", "*.wc.acme"]
              }
            },
            "keyid_01": {
              "hmac": "YW5vdXRoZXJfdmVyeV9sb25nX2htYWNfZm9yX2tleWlkXzAxX3doaWNoIHdpbGxfYmUgdXNlZF9kdXJpbmcgcmVncmVzc2lvbg",
              "order": {
                "wildcard_certificate_disable": false
              },
              "authorization": {
                "prevalidated_domainlist": ["*.foo.bar"]
              }
            },
            "keyid_02": {
              "hmac": "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
            }
          }
          EOF
          sudo awk '
          BEGIN { in_order = 0; has_wildcard = 0 }
          /^\[Order\]$/ {
            in_order = 1
            print
            next
          }
          /^\[/ && in_order {
            if (!has_wildcard) {
              print "wildcard_certificate_disable: True"
              has_wildcard = 1
            }
            in_order = 0
          }
          {
            if (in_order && /^wildcard_certificate_disable[[:space:]]*:/) {
              sub(/:.*/, ": True")
              has_wildcard = 1
            }
            print
          }
          END {
            if (in_order && !has_wildcard) {
              print "wildcard_certificate_disable: True"
            }
          }
          ' examples/Docker/data/acme_srv.cfg | sudo tee examples/Docker/data/acme_srv.cfg.tmp > /dev/null
          sudo mv examples/Docker/data/acme_srv.cfg.tmp examples/Docker/data/acme_srv.cfg

      - name: "Restart services after profile and wildcard config change"
        run: |
          cd examples/Docker
          docker compose restart

      - name: "Assert non-strict mode via directory metadata (with profiling)"
        uses: ./.github/actions/wf_specific/eab/assert_directory_eab_required
        with:
          EXPECTED_VALUE: "false"

      - name: "Lego profile and wildcard matrix tests"
        uses: ./.github/actions/wf_specific/eab/enroll_lego_profile_matrix

      - name: "[ * ] Collecting test logs"
        if: ${{ failure() }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/upload
          sudo cp -rp examples/Docker/data/ ${{ github.workspace }}/artifact/data/
          cd examples/Docker
          docker compose logs > ${{ github.workspace }}/artifact/docker-compose.log
          sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz docker-compose.log data

      - name: "[ * ] Uploading artifacts"
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: container-tests-${{ matrix.websrv }}-${{ matrix.dbhandler }}.tar.gz
          path: ${{ github.workspace }}/artifact/upload/

  # ---------------------------------------------------------
  # Test RPMs (EL8 & EL9) downloaded from the producer run
  # ---------------------------------------------------------
  test-rpm:
    needs: guard
    runs-on: ubuntu-latest
    if: github.repository == 'grindsa/acme2certifier'
    strategy:
      fail-fast: false
      matrix:
        rhversion: [8, 9]
        execscript: ['rpm_tester.sh', 'django_tester.sh']

    steps:
      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: "Parse JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.GH_CFG }}

      - name: "Parse JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.GH_CFG }}

      - name: "Prepare Alma environment"
        uses: ./.github/actions/rpm_prep
        with:
          GH_USER: ${{ env.GH_USER }}
          GH_SBOM_REPO_TOKEN: ${{ env.GH_SBOM_REPO_TOKEN }}
          RH_VERSION: ${{ matrix.rhversion }}
          RPM_BUILD: false

      - name: "Download RPM artifact by name from build run"
        uses: ./.github/actions/download_artifact
        with:
          RUN_ID: ${{ inputs.run_id }}
          ARTIFACT_NAME: acme2certifier-${{ inputs.run_id }}.noarch.rpm
          DESTINATION_PATH: data/
          TOKEN: ${{ secrets.GH_WF_TOKEN }}
          REPO: ${{ github.repository }}

      - name: "Create letsencrypt folder"
        run: |
          mkdir -p certbot
          mkdir -p lego
          mkdir -p acme-sh

      - name: "Setup openssl ca_handler"
        run: |
          sudo mkdir -p data/volume/acme_ca/certs
          sudo cp test/ca/sub-ca-key.pem test/ca/sub-ca-crl.pem test/ca/sub-ca-cert.pem test/ca/root-ca-cert.pem data/volume/acme_ca/
          sudo cp examples/eab_handler/key_file.json data/volume/acme_ca
          sudo cp .github/openssl_ca_handler.py_acme_srv_choosen_handler.cfg data/volume/acme_srv.cfg
          sudo chmod 777 data/volume/acme_srv.cfg
          sudo echo -e "\n\n[EABhandler]" >> data/volume/acme_srv.cfg
          sudo echo "eab_handler_file: /opt/acme2certifier/examples/eab_handler/json_handler.py" >> data/volume/acme_srv.cfg
          sudo echo "key_file: /opt/acme2certifier/volume/acme_ca/key_file.json" >> data/volume/acme_srv.cfg

      - name: "Execute install scipt"
        run: |
          docker exec acme-srv sh /tmp/acme2certifier/$EXEC_SCRIPT
        env:
          EXEC_SCRIPT: ${{ matrix.execscript }}

      - name: "Register without eab-credentials - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_wo_credentials
        with:
          DEPLOYMENT_TYPE: "rpm"

      - name: "Register with unknown eab-credentials - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_unknown_credentials
        with:
          EAB_KEY_ID: "unknown_key_id"
          EAB_KEY_SECRET: "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
          DEPLOYMENT_TYPE: "rpm"

      - name: "Register with wrong eab-credentials - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_wrong_credentials
        with:
          EAB_KEY_ID: "keyid_01"
          EAB_KEY_SECRET: "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
          DEPLOYMENT_TYPE: "rpm"

      - name: "Enroll tests"
        uses: ./.github/actions/wf_specific/eab/enroll_eab
        with:
          DEPLOYMENT_TYPE: "rpm"
          EXEC_SCRIPT: ${{ matrix.execscript }}
          DATA_DIR: "data/volume"

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: rpm

      - name: "Switch to non-strict mode with EAB profiling and wildcard disabled (rpm)"
        run: |
          sudo echo "eab_strict_mode: False" >> data/volume/acme_srv.cfg
          sudo echo "eab_profiling: True" >> data/volume/acme_srv.cfg
          sudo sed -i "s#json_handler.py#kid_profile_handler.py#g" data/volume/acme_srv.cfg

          cat << 'EOF' | sudo tee data/volume/acme_ca/key_file.json > /dev/null
          {
            "keyid_00": {
              "hmac": "V2VfbmVlZF9hbm90aGVyX3ZlcnkfX2xvbmdfaG1hY190b19jaGVja19lYWJfZm9yX2tleWlkXzAwX2FzX2xlZ29fZW5mb3JjZXNfYW5faG1hY19sb25nZXJfdGhhbl8yNTZfYml0cw",
              "order": {
                "wildcard_certificate_disable": false
              },
              "authorization": {
                "prevalidated_domainlist": ["lego-00.acme", "*.wc.acme"]
              }
            },
            "keyid_01": {
              "hmac": "YW5vdXRoZXJfdmVyeV9sb25nX2htYWNfZm9yX2tleWlkXzAxX3doaWNoIHdpbGxfYmUgdXNlZF9kdXJpbmcgcmVncmVzc2lvbg",
              "order": {
                "wildcard_certificate_disable": false
              },
              "authorization": {
                "prevalidated_domainlist": ["*.foo.bar"]
              }
            },
            "keyid_02": {
              "hmac": "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
            }
          }
          EOF

          sudo awk '
          BEGIN { in_order = 0; has_wildcard = 0 }
          /^\[Order\]$/ {
            in_order = 1
            print
            next
          }
          /^\[/ && in_order {
            if (!has_wildcard) {
              print "wildcard_certificate_disable: True"
              has_wildcard = 1
            }
            in_order = 0
          }
          {
            if (in_order && /^wildcard_certificate_disable[[:space:]]*:/) {
              sub(/:.*/, ": True")
              has_wildcard = 1
            }
            print
          }
          END {
            if (in_order && !has_wildcard) {
              print "wildcard_certificate_disable: True"
            }
          }
          ' data/volume/acme_srv.cfg | sudo tee data/volume/acme_srv.cfg.tmp > /dev/null
          sudo mv data/volume/acme_srv.cfg.tmp data/volume/acme_srv.cfg

      - name: "Restart services after profile and wildcard config change (rpm)"
        run: |
          docker exec acme-srv sh /tmp/acme2certifier/$EXEC_SCRIPT restart
        env:
          EXEC_SCRIPT: ${{ matrix.execscript }}

      - name: "Assert non-strict mode via directory metadata (rpm with profiling)"
        uses: ./.github/actions/wf_specific/eab/assert_directory_eab_required
        with:
          EXPECTED_VALUE: "false"

      - name: "Lego profile and wildcard matrix tests (rpm)"
        uses: ./.github/actions/wf_specific/eab/enroll_lego_profile_matrix

      - name: "[ * ] Collecting test logs"
        if: ${{ failure() }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/upload
          docker exec acme-srv tar cvfz /tmp/acme2certifier/a2c.tgz /opt/acme2certifier
          sudo cp -rp data/ ${{ github.workspace }}/artifact/data/
          sudo rm ${{ github.workspace }}/artifact/data/*.rpm
          sudo cp -rp acme-sh/ ${{ github.workspace }}/artifact/acme-sh/
          docker exec acme-srv cat /etc/nginx/nginx.conf.orig > ${{ github.workspace }}/artifact/data/nginx.conf.orig
          docker exec acme-srv cat /etc/nginx/nginx.conf > ${{ github.workspace }}/artifact/data/nginx.conf
          docker exec acme-srv cat /var/log/messages > ${{ github.workspace }}/artifact/acme-srv.log
          sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz data acme-srv.log acme-sh

      - name: "[ * ] Uploading artifacts"
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: test-rpm-rh${{ matrix.rhversion }}.tar.gz
          path: ${{ github.workspace }}/artifact/upload/

  # ---------------------------------------------------------
  # Test DEB downloaded from the producer run
  # ---------------------------------------------------------
  test-deb:
    needs: guard
    runs-on: ubuntu-latest
    if: github.repository == 'grindsa/acme2certifier'
    strategy:
      fail-fast: false
      matrix:
        websrv: ['apache2', 'nginx']
        execscript: ['deb_tester.sh','django_tester.sh']

    steps:
      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: "Parse XCA configuration from JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.XCA_CFG }}

      - name: "Prepare Ubuntu environment"
        if: matrix.execscript == 'deb_tester.sh'
        uses: ./.github/actions/deb_prep
        with:
          DEB_BUILD: false

      - name: "Prepare Ubuntu environment"
        if: matrix.execscript == 'django_tester.sh'
        uses: ./.github/actions/deb_prep
        with:
          DEB_BUILD: false
          DJANGO_DB: psql

      - name: "Download DEB artifact by name from build run"
        uses: ./.github/actions/download_artifact
        with:
          RUN_ID: ${{ inputs.run_id }}
          ARTIFACT_NAME: acme2certifier-${{ inputs.run_id }}-1_all.deb
          DESTINATION_PATH: data/
          TOKEN: ${{ secrets.GH_WF_TOKEN }}
          REPO: ${{ github.repository }}

      - name: "Create letsencrypt folder"
        run: |
          mkdir -p certbot
          mkdir -p lego
          mkdir -p acme-sh

      - name: "Setup openssl ca_handler"
        run: |
          sudo mkdir -p data/volume/acme_ca/certs
          sudo cp test/ca/sub-ca-key.pem test/ca/sub-ca-crl.pem test/ca/sub-ca-cert.pem test/ca/root-ca-cert.pem data/volume/acme_ca/
          sudo cp examples/eab_handler/key_file.json data/volume/acme_ca
          sudo cp .github/openssl_ca_handler.py_acme_srv_choosen_handler.cfg data/volume/acme_srv.cfg
          sudo chmod 777 data/volume/acme_srv.cfg
          sudo sed -i "s/examples\/ca_handler/\/var\/www\/acme2certifier\/examples\/ca_handler/g" data/volume/acme_srv.cfg
          sudo sed -i "s/volume/\/var\/www\/acme2certifier\/volume/g" data/volume/acme_srv.cfg
          sudo echo -e "\n\n[EABhandler]" >> data/volume/acme_srv.cfg
          sudo echo "eab_handler_file: /var/www/acme2certifier/examples/eab_handler/json_handler.py" >> data/volume/acme_srv.cfg
          sudo echo "key_file: /var/www/acme2certifier/volume/acme_ca/key_file.json" >> data/volume/acme_srv.cfg

      - name: "Execute install script"
        run: |
          docker exec acme-srv bash /tmp/acme2certifier/$EXECSCRIPT install $WEBSRV
        env:
          WEBSRV: ${{ matrix.websrv }}
          EXECSCRIPT: ${{ matrix.execscript }}

      - name: "Register without eab-credentials - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_wo_credentials
        with:
          DEPLOYMENT_TYPE: "deb"

      - name: "Register with unknown eab-credentials - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_unknown_credentials
        with:
          EAB_KEY_ID: "unknown_key_id"
          EAB_KEY_SECRET: "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
          DEPLOYMENT_TYPE: "deb"

      - name: "Register with wrong eab-credentials - should fail"
        uses: ./.github/actions/wf_specific/eab/enroll_wrong_credentials
        with:
          EAB_KEY_ID: "keyid_01"
          EAB_KEY_SECRET: "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
          DEPLOYMENT_TYPE: "deb"

      - name: "Enroll tests"
        uses: ./.github/actions/wf_specific/eab/enroll_eab
        with:
          DEPLOYMENT_TYPE: "deb"
          EXEC_SCRIPT: ${{ matrix.execscript }}
          WEBSRV: ${{ matrix.websrv }}
          DATA_DIR: "data/volume"

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: deb

      - name: "Switch to non-strict mode with EAB profiling and wildcard disabled (deb)"
        run: |
          sudo echo "eab_strict_mode: False" >> data/volume/acme_srv.cfg
          sudo echo "eab_profiling: True" >> data/volume/acme_srv.cfg
          sudo sed -i "s#json_handler.py#kid_profile_handler.py#g" data/volume/acme_srv.cfg

          cat << 'EOF' | sudo tee data/volume/acme_ca/key_file.json > /dev/null
          {
            "keyid_00": {
              "hmac": "V2VfbmVlZF9hbm90aGVyX3ZlcnkfX2xvbmdfaG1hY190b19jaGVja19lYWJfZm9yX2tleWlkXzAwX2FzX2xlZ29fZW5mb3JjZXNfYW5faG1hY19sb25nZXJfdGhhbl8yNTZfYml0cw",
              "order": {
                "wildcard_certificate_disable": false
              },
              "authorization": {
                "prevalidated_domainlist": ["lego-00.acme", "*.wc.acme"]
              }
            },
            "keyid_01": {
              "hmac": "YW5vdXRoZXJfdmVyeV9sb25nX2htYWNfZm9yX2tleWlkXzAxX3doaWNoIHdpbGxfYmUgdXNlZF9kdXJpbmcgcmVncmVzc2lvbg",
              "order": {
                "wildcard_certificate_disable": false
              },
              "authorization": {
                "prevalidated_domainlist": ["*.foo.bar"]
              }
            },
            "keyid_02": {
              "hmac": "dGhpc19pc19hX3ZlcnlfbG9uZ19obWFjX3RvX21ha2Vfc3VyZV90aGF0X2l0c19tb3JlX3RoYW5fMjU2X2JpdHM"
            }
          }
          EOF

          sudo awk '
          BEGIN { in_order = 0; has_wildcard = 0 }
          /^\[Order\]$/ {
            in_order = 1
            print
            next
          }
          /^\[/ && in_order {
            if (!has_wildcard) {
              print "wildcard_certificate_disable: True"
              has_wildcard = 1
            }
            in_order = 0
          }
          {
            if (in_order && /^wildcard_certificate_disable[[:space:]]*:/) {
              sub(/:.*/, ": True")
              has_wildcard = 1
            }
            print
          }
          END {
            if (in_order && !has_wildcard) {
              print "wildcard_certificate_disable: True"
            }
          }
          ' data/volume/acme_srv.cfg | sudo tee data/volume/acme_srv.cfg.tmp > /dev/null
          sudo mv data/volume/acme_srv.cfg.tmp data/volume/acme_srv.cfg

      - name: "Restart services after profile and wildcard config change (deb)"
        run: |
          docker exec acme-srv bash /tmp/acme2certifier/$EXECSCRIPT install $WEBSRV
        env:
          WEBSRV: ${{ matrix.websrv }}
          EXECSCRIPT: ${{ matrix.execscript }}

      - name: "Assert non-strict mode via directory metadata (deb with profiling)"
        uses: ./.github/actions/wf_specific/eab/assert_directory_eab_required
        with:
          EXPECTED_VALUE: "false"

      - name: "Lego profile and wildcard matrix tests (deb)"
        uses: ./.github/actions/wf_specific/eab/enroll_lego_profile_matrix

      - name: "[ * ] Collecting test logs"
        if: ${{ failure() }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/upload
          docker exec acme-srv tar cvfz /tmp/acme2certifier/a2c.tgz /var/www/acme2certifier
          sudo cp -rp data/ ${{ github.workspace }}/artifact/data/
          sudo rm ${{ github.workspace }}/artifact/data/*.deb
          if [ ${{ matrix.websrv }} == "apache2" ]; then
            docker exec acme-srv cat /var/log/apache2/error.log > ${{ github.workspace }}/artifact/acme-srv.log
          else
            docker exec acme-srv cat /var/log/nginx/error.log > ${{ github.workspace }}/artifact/acme-srv.log
          fi
          docker exec acme-srv cat /var/log/syslog > ${{ github.workspace }}/artifact/syslog
          sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz data acme-srv.log syslog

      - name: "[ * ] Uploading artifacts"
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: test-deb-${{ matrix.websrv }}-${{ matrix.execscript }}.tar.gz
          path: ${{ github.workspace }}/artifact/upload/
