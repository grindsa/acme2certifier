name: CA handler tests - DogTag
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run the workflow on'
        required: true
        default: 'main'
      run_id:
        description: 'Run ID of the producing workflow'
        required: true
        default: '0'
      sha:
        description: 'SHA of the commit to run the workflow on'
        required: true
        default: ''
      called_by_workflow:
        description: 'Name of the producing workflow'
        required: true
        default: 'manual-trigger'
      full_ref:
        description: 'Full git ref of the commit to run the workflow on'
        required: false
        default: ''

jobs:

  # ---------------------------------------------------------
  # Quick guard to validate incoming payload
  # ---------------------------------------------------------
  guard:
    runs-on: ubuntu-latest
    if: ${{ inputs.sha != '' && inputs.run_id != '' && inputs.branch != '' && github.repository == 'grindsa/acme2certifier' }}
    steps:
      - run: |
          echo "Triggered by SHA:    $SHA"
          echo "From branch:         $BRANCH"
          echo "Producer run_id:     $RUN_ID"
        env:
          SHA: ${{ inputs.sha }}
          BRANCH: ${{ inputs.branch }}
          RUN_ID: ${{ inputs.run_id }}

  # ---------------------------------------------------------
  # Test container images (matrix from payload)
  # ---------------------------------------------------------
  acme-test-containers:
    needs: guard
    runs-on: ubuntu-latest
    if: github.repository == 'grindsa/acme2certifier1'
    strategy:
      fail-fast: false
      matrix:
        websrv: ['apache2', 'nginx']
        dbhandler: ['wsgi', 'django']

    steps:
      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: "Get runner ip"
        run: |
          echo RUNNER_IP=$(ip addr show eth0 | grep -i "inet " | cut -d ' ' -f 6 | cut -d '/' -f 1) >> $GITHUB_ENV
          echo RUNNER_PATH=$(pwd | sed 's_/_\\/_g') >> $GITHUB_ENV

      - run: echo "runner IP is $RUNNER_IP"
        env:
          RUNNER_IP: ${{ env.RUNNER_IP }}

      - name: Parse DOGTAG config
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.DOGTAG_CFG }}

      - name: "Download and import container"
        uses: ./.github/actions/container_load
        with:
          RUN_ID: ${{ inputs.run_id }}
          ARTIFACT_NAME: a2c-${{ inputs.run_id }}.${{ matrix.websrv }}.${{ matrix.dbhandler }}.tar
          DESTINATION_PATH: /tmp
          TOKEN: ${{ secrets.GH_WF_TOKEN }}
          REPO: ${{ github.repository }}

      - name: "Prepare container environment"
        uses: ./.github/actions/container_prep
        with:
          DB_HANDLER: ${{ matrix.dbhandler }}
          WEB_SRV: ${{ matrix.websrv }}
          CONTAINER_BUILD: false
          NAME_SPACE: acme

      - name: "Prepare dogtag server"
        uses: ./.github/actions/wf_specific/dogtag_ca_handler/dogtag_prep
        with:
          RUNNER_IP: ${{ env.RUNNER_IP }}
          NAME_SPACE: acme
          ADMIN_USER: ${{ secrets.DOGTAG_ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.DOGTAG_ADMIN_PASSWORD }}
          A2C_USER: ${{ secrets.DOGTAG_A2C_USER }}
          A2C_PASSWORD: ${{ secrets.DOGTAG_A2C_PASSWORD }}

      - name: "Setup dogtag_ca_handler"
        run: |
          sudo mkdir -p examples/Docker/data/acme
          sudo cp dogtag/$A2C_USER* examples/Docker/data/acme/
          sudo chmod -R 777 examples/Docker/data/acme
          sudo cp .github/openssl_ca_handler.py_acme_srv_default_handler.cfg examples/Docker/data/acme_srv.cfg
          sudo chmod 777 examples/Docker/data/acme_srv.cfg
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > examples/Docker/data/acme_srv.cfg
          sudo echo "handler_file: examples/ca_handler/dogtag_ca_handler.py" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_host: https://dogtag.acme:8443" >> examples/Docker/data/acme_srv.cfg
          sudo echo "client_key: volume/acme/$A2C_USER.key" >> examples/Docker/data/acme_srv.cfg
          sudo echo "client_cert: volume/acme/$A2C_USER.crt" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_bundle: False" >> examples/Docker/data/acme_srv.cfg
          sudo echo "profile: caServerCert" >> examples/Docker/data/acme_srv.cfg
          sudo echo "certrequest_approve: True" >> examples/Docker/data/acme_srv.cfg
          sudo echo "enrollment_config_log: True" >> examples/Docker/data/acme_srv.cfg
          # sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: True/g" examples/Docker/data/acme_srv.cfg
          # sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\ncert_reusage_timeframe: 1800\nenrollment_timeout: 15\ncert_operations_log: True/g" examples/Docker/data/acme_srv.cfg
          sudo echo "allowed_domainlist: [\"*.foo.bar\", \"*.acme\"]" >> examples/Docker/data/acme_srv.cfg
        env:
          ADMIN_USER: ${{ inputs.ADMIN_USER }}


      - name: "Bring up a2c container"
        uses: ./.github/actions/container_up
        with:
          DB_HANDLER: ${{ matrix.dbhandler }}
          WEB_SRV: ${{ matrix.websrv }}

      - name: "Generate UUID"
        run: |
          echo UUID=$(uuidgen | cut -d "-" -f1) >> $GITHUB_ENV
      - run: echo "UUID ${{ env.UUID }}"

      - name: "Test enrollment"
        uses: ./.github/actions/acme_clients
        with:
          TEST_ADL: "true"
          USE_RSA: "true"
          USE_CERTBOT: "false"
          HOSTNAME_SUFFIX: -${{ env.UUID }}

      - name: "Check container configuration"
        uses: ./.github/actions/container_check
        with:
          DB_HANDLER: ${{ matrix.dbhandler }}
          WEB_SRV: ${{ matrix.websrv }}

      - name: "ACME Profiling - Setup a2c with dogtag_ca_handler"
        run: |
          # disable challenge validation to avoid issues with profile tests
          sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: True/g" examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/tnauthlist_support: False/tnauthlist_support: False\nprofiles={\"caServerCert\": \"http:\/\/foo.bar\/caservercert\", \"Webserver\": \"http:\/\/foo.bar\/webserver\", \"profile3\": \"http:\/\/foo.bar\/profile3\"}/g" examples/Docker/data/acme_srv.cfg
          cd examples/Docker/
          docker compose restart

      - name: "ACME Profiling - Test enrollment"
        uses: ./.github/actions/wf_specific/dogtag_ca_handler/enroll_acmeprofile

      - name: "EAB Profiling - Setup a2c with dogtag_ca_handler"
        run: |
          sudo echo -e "\n[EABhandler]" >> examples/Docker/data/acme_srv.cfg
          sudo echo "eab_handler_file: /var/www/acme2certifier/examples/eab_handler/kid_profile_handler.py" >> examples/Docker/data/acme_srv.cfg
          sudo echo "key_file: volume/kid_profiles.json" >> examples/Docker/data/acme_srv.cfg
          sudo echo "eab_profiling: True" >> examples/Docker/data/acme_srv.cfg

          sudo cp examples/eab_handler/kid_profiles.json examples/Docker/data/kid_profiles.json
          sudo sed -i '29,33d' examples/Docker/data/kid_profiles.json
          sudo sed -i '20,22d' examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"profile_id\"\: \[\"profile_1\", \"profile_2\", \"profile_3\"\]/\"profile\"\: \[\"Webserver\", \"caServerCert\"\, \"100\"]/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"profile_id\"\: \"profile_2\"/\"profile\"\: \"Webserver\"/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"ca_name\": \"example_ca_2\",/\"unknown_key\": \"unknown_value\"/" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"ca_name\": \"example_ca\",/\"unknown_key\": \"unknown_value\"/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/example.net/acme/g" examples/Docker/data/kid_profiles.json
          sudo sed -i '18,19d' examples/Docker/data/kid_profiles.json
          sudo sed -i '8,9d' examples/Docker/data/kid_profiles.json

          cd examples/Docker/
          docker compose restart

      - name: "EAB Profiling - Test enrollment"
        uses: ./.github/actions/wf_specific/dogtag_ca_handler/enroll_eabprofile

      - name: "[ * ] collecting test data"
        if: ${{ failure() }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/upload
          sudo cp -rp examples/Docker/data/ ${{ github.workspace }}/artifact/data/
          cd examples/Docker
          docker compose logs > ${{ github.workspace }}/artifact/docker-compose.log
          sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz data docker-compose.log

      - name: "[ * ] Uploading artifacts"
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: acme-test-containers-${{ matrix.websrv }}-${{ matrix.dbhandler }}.tar.gz
          path: ${{ github.workspace }}/artifact/upload/

  # ---------------------------------------------------------
  # Test RPMs (EL8 & EL9) downloaded from the producer run
  # ---------------------------------------------------------
  test-rpm:
    needs: guard
    runs-on: ubuntu-latest
    if: github.repository == 'grindsa/acme2certifier1'
    strategy:
      fail-fast: false
      matrix:
        rhversion: [8, 9]
        execscript: ['rpm_tester.sh', 'django_tester.sh']
    steps:

      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: "Parse JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.GH_CFG }}

      - name: Parse DOGTAG config
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.DOGTAG_CFG }}

      - name: "Get runner ip"
        run: |
          echo RUNNER_IP=$(ip addr show eth0 | grep -i "inet " | cut -d ' ' -f 6 | cut -d '/' -f 1) >> $GITHUB_ENV
          echo RUNNER_PATH=$(pwd | sed 's_/_\\/_g') >> $GITHUB_ENV
      - run: echo "runner IP is $RUNNER_IP"
        env:
          RUNNER_IP: ${{ env.RUNNER_IP }}

      - name: "Prepare Alma environment"
        uses: ./.github/actions/rpm_prep
        with:
          GH_USER: ${{ env.GH_USER }}
          GH_SBOM_REPO_TOKEN: ${{ env.GH_SBOM_REPO_TOKEN }}
          RH_VERSION: ${{ matrix.rhversion }}
          RPM_BUILD: false

      - name: "Prepare dogtag server"
        uses: ./.github/actions/wf_specific/dogtag_ca_handler/dogtag_prep
        with:
          RUNNER_IP: ${{ env.RUNNER_IP }}
          NAME_SPACE: acme
          ADMIN_USER: ${{ secrets.DOGTAG_ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.DOGTAG_ADMIN_PASSWORD }}
          A2C_USER: ${{ secrets.DOGTAG_A2C_USER }}
          A2C_PASSWORD: ${{ secrets.DOGTAG_A2C_PASSWORD }}

      - name: "Download RPM artifact by name from build run"
        uses: ./.github/actions/download_artifact
        with:
          RUN_ID: ${{ inputs.run_id }}
          ARTIFACT_NAME: acme2certifier-${{ inputs.run_id }}.noarch.rpm
          DESTINATION_PATH: data/
          TOKEN: ${{ secrets.GH_WF_TOKEN }}
          REPO: ${{ github.repository }}

      - name: "Setup dogtag_ca_handler"
        run: |
          sudo mkdir -p data/volume/acme_ca/
          sudo cp dogtag/$A2C_USER* data/volume/
          sudo chmod -R 777 data/volume/
          sudo cp .github/openssl_ca_handler.py_acme_srv_default_handler.cfg data/volume/acme_srv.cfg
          sudo chmod 777 data/volume/acme_srv.cfg
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > data/volume/acme_srv.cfg
          sudo echo "handler_file: examples/ca_handler/dogtag_ca_handler.py" >> data/volume/acme_srv.cfg
          sudo echo "api_host: https://dogtag.acme:8443" >> data/volume/acme_srv.cfg
          sudo echo "client_key: /opt/acme2certifier/volume/$A2C_USER.key" >> data/volume/acme_srv.cfg
          sudo echo "client_cert: /opt/acme2certifier/volume/$A2C_USER.crt" >> data/volume/acme_srv.cfg
          sudo echo "ca_bundle: False" >> data/volume/acme_srv.cfg
          sudo echo "profile: caServerCert" >> data/volume/acme_srv.cfg
          sudo echo "certrequest_approve: True" >> data/volume/acme_srv.cfg
          sudo echo "enrollment_config_log: True" >> data/volume/acme_srv.cfg
          # sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: True/g" data/volume/acme_srv.cfg
          # sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\ncert_reusage_timeframe: 1800\nenrollment_timeout: 15\ncert_operations_log: True/g" data/volume/acme_srv.cfg
          sudo echo "allowed_domainlist: [\"*.foo.bar\", \"*.acme\"]" >> data/volume/acme_srv.cfg
        env:
          ADMIN_USER: ${{ inputs.ADMIN_USER }}

      - name: "Execute install script"
        run: |
          docker exec acme-srv sh /tmp/acme2certifier/$EXEC_SCRIPT
        env:
          EXEC_SCRIPT: ${{ matrix.execscript }}

      - name: "Generate UUID"
        run: |
          echo UUID=$(uuidgen | cut -d "-" -f1) >> $GITHUB_ENV
      - run: echo "UUID ${{ env.UUID }}"

      - name: "Test enrollment"
        uses: ./.github/actions/acme_clients
        with:
          TEST_ADL: "true"
          USE_RSA: "true"
          USE_CERTBOT: "false"
          HOSTNAME_SUFFIX: -${{ env.UUID }}

      - name: "Verify allowed_domainlist error"
        run: |
          docker exec acme-srv grep -iE 'FQDN/SAN [^ ]+ not allowed by configuration' /var/log/messages

      - name: "ACME Profiling - Setup a2c with dogtag_ca_handler"
        run: |
          # disable challenge validation to avoid issues with profile tests
          sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: True/g" data/volume/acme_srv.cfg
          sudo sed -i "s/tnauthlist_support: False/tnauthlist_support: False\nprofiles={\"caServerCert\": \"http:\/\/foo.bar\/caservercert\", \"Webserver\": \"http:\/\/foo.bar\/webserver\", \"profile3\": \"http:\/\/foo.bar\/profile3\"}/g" data/volume/acme_srv.cfg

      - name: "Reconfigure a2c"
        run: |
          docker exec acme-srv sh /tmp/acme2certifier/$EXEC_SCRIPT  restart
        env:
          EXEC_SCRIPT: ${{ matrix.execscript }}

      - name: "ACME Profiling - Test enrollment"
        uses: ./.github/actions/wf_specific/dogtag_ca_handler/enroll_acmeprofile

      - name: "EAB Profiling - Setup a2c with dogtag_ca_handler"
        run: |
          sudo echo -e "\n[EABhandler]" >> data/volume/acme_srv.cfg
          sudo echo "eab_handler_file: /opt/acme2certifier/examples/eab_handler/kid_profile_handler.py" >> data/volume/acme_srv.cfg
          sudo echo "key_file: /opt/acme2certifier/volume/acme_ca/kid_profiles.json" >> data/volume/acme_srv.cfg
          sudo echo "eab_profiling: True" >> data/volume/acme_srv.cfg

          sudo cp examples/eab_handler/kid_profiles.json data/volume/acme_ca/kid_profiles.json
          sudo sed -i '29,33d' data/volume/acme_ca/kid_profiles.json
          sudo sed -i '20,22d' data/volume/acme_ca/kid_profiles.json
          sudo sed -i "s/\"profile_id\"\: \[\"profile_1\", \"profile_2\", \"profile_3\"\]/\"profile\"\: \[\"Webserver\", \"caServerCert\"\, \"100\"]/g" data/volume/acme_ca/kid_profiles.json
          sudo sed -i "s/\"profile_id\"\: \"profile_2\"/\"profile\"\: \"Webserver\"/g" data/volume/acme_ca/kid_profiles.json
          sudo sed -i "s/\"ca_name\": \"example_ca_2\",/\"unknown_key\": \"unknown_value\"/" data/volume/acme_ca/kid_profiles.json
          sudo sed -i "s/\"ca_name\": \"example_ca\",/\"unknown_key\": \"unknown_value\"/g" data/volume/acme_ca/kid_profiles.json
          sudo sed -i "s/example.net/acme/g" data/volume/acme_ca/kid_profiles.json
          sudo sed -i '18,19d' data/volume/acme_ca/kid_profiles.json
          sudo sed -i '8,9d' data/volume/acme_ca/kid_profiles.json

      - name: "Reconfigure a2c"
        run: |
          docker exec acme-srv sh /tmp/acme2certifier/$EXEC_SCRIPT  restart
        env:
          EXEC_SCRIPT: ${{ matrix.execscript }}

      - name: "EAB Profiling - Test enrollment"
        uses: ./.github/actions/wf_specific/dogtag_ca_handler/enroll_eabprofile

      - name: "[ * ] Collecting test logs"
        if: ${{ failure() }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/upload
          docker exec acme-srv tar cvfz /tmp/acme2certifier/a2c.tgz /opt/acme2certifier
          sudo cp -rp data/ ${{ github.workspace }}/artifact/data/
          sudo rm ${{ github.workspace }}/artifact/data/*.rpm
          docker exec acme-srv cat /etc/nginx/nginx.conf.orig > ${{ github.workspace }}/artifact/data/nginx.conf.orig
          docker exec acme-srv cat /etc/nginx/nginx.conf > ${{ github.workspace }}/artifact/data/nginx.conf
          docker exec acme-srv cat /var/log/messages > ${{ github.workspace }}/artifact/acme-srv.log
          sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz data acme-srv.log

      - name: "[ * ] Uploading artifacts"
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: test-rpm-rh${{ matrix.rhversion }}-${{ matrix.execscript }}.tar.gz
          path: ${{ github.workspace }}/artifact/upload/

  # ---------------------------------------------------------
  # Test DEB downloaded from the producer run
  # ---------------------------------------------------------
  test-deb:
    needs: guard
    runs-on: ubuntu-latest
    if: github.repository == 'grindsa/acme2certifier'
    strategy:
      fail-fast: false
      matrix:
        websrv: ['apache2', 'nginx']
        execscript: ['deb_tester.sh','django_tester.sh']

    steps:
      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: Parse DOGTAG config
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.DOGTAG_CFG }}

      - name: "Parse GH_CFG secrets"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.GH_CFG }}

      - name: "Prepare Ubuntu environment"
        if: matrix.execscript == 'deb_tester.sh'
        uses: ./.github/actions/deb_prep
        with:
          DEB_BUILD: false
          NAME_SPACE: "acme"

      - name: "Prepare Ubuntu environment"
        if: matrix.execscript == 'django_tester.sh'
        uses: ./.github/actions/deb_prep
        with:
          DEB_BUILD: false
          DJANGO_DB: psql
          NAME_SPACE: "acme"

      - name: "Prepare dogtag server"
        uses: ./.github/actions/wf_specific/dogtag_ca_handler/dogtag_prep
        with:
          RUNNER_IP: ${{ env.RUNNER_IP }}
          NAME_SPACE: acme
          ADMIN_USER: ${{ secrets.DOGTAG_ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.DOGTAG_ADMIN_PASSWORD }}
          A2C_USER: ${{ secrets.DOGTAG_A2C_USER }}
          A2C_PASSWORD: ${{ secrets.DOGTAG_A2C_PASSWORD }}

      - name: "Download DEB artifact by name from build run"
        uses: ./.github/actions/download_artifact
        with:
          RUN_ID: ${{ inputs.run_id }}
          ARTIFACT_NAME: acme2certifier-${{ inputs.run_id }}-1_all.deb
          DESTINATION_PATH: data/
          TOKEN: ${{ secrets.GH_WF_TOKEN }}
          REPO: ${{ github.repository }}

      - name: "Get runner ip"
        run: |
          echo RUNNER_IP=$(ip addr show eth0 | grep -i "inet " | cut -d ' ' -f 6 | cut -d '/' -f 1) >> $GITHUB_ENV
          echo RUNNER_PATH=$(pwd | sed 's_/_\\/_g') >> $GITHUB_ENV
      - run: echo "runner IP is $RUNNER_IP"
        env:
          RUNNER_IP: ${{ env.RUNNER_IP }}

      - name: "Generate UUID"
        run: |
          echo UUID=$(uuidgen | cut -d "-" -f1) >> $GITHUB_ENV
      - run: echo "UUID ${{ env.UUID }}"

      - name: "Setup dogtag_ca_handler"
        run: |
          sudo mkdir -p data/volume/acme_ca/
          sudo cp dogtag/$A2C_USER* data/volume/
          sudo chmod -R 777 data/volume/
          sudo cp .github/openssl_ca_handler.py_acme_srv_default_handler.cfg data/volume/acme_srv.cfg
          sudo chmod 777 data/volume/acme_srv.cfg
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > data/volume/acme_srv.cfg
          sudo echo "handler_file: /var/www/acme2certifier/examples/ca_handler/dogtag_ca_handler.py" >> data/volume/acme_srv.cfg
          sudo echo "api_host: https://dogtag.acme:8443" >> data/volume/acme_srv.cfg
          sudo echo "client_key: /var/www/acme2certifier/volume/$A2C_USER.key" >> data/volume/acme_srv.cfg
          sudo echo "client_cert: /var/www/acme2certifier/volume/$A2C_USER.crt" >> data/volume/acme_srv.cfg
          sudo echo "ca_bundle: False" >> data/volume/acme_srv.cfg
          sudo echo "profile: caServerCert" >> data/volume/acme_srv.cfg
          sudo echo "certrequest_approve: True" >> data/volume/acme_srv.cfg
          sudo echo "enrollment_config_log: True" >> data/volume/acme_srv.cfg
          # sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: True/g" data/volume/acme_srv.cfg
          # sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\ncert_reusage_timeframe: 1800\nenrollment_timeout: 15\ncert_operations_log: True/g" data/volume/acme_srv.cfg
          sudo echo "allowed_domainlist: [\"*.foo.bar\", \"*.acme\"]" >> data/volume/acme_srv.cfg
        env:
          ADMIN_USER: ${{ inputs.ADMIN_USER }}

      - name: "Execute install script"
        run: |
          docker exec acme-srv bash /tmp/acme2certifier/$EXECSCRIPT install $WEBSRV
        env:
          WEBSRV: ${{ matrix.websrv }}
          EXECSCRIPT: ${{ matrix.execscript }}

      - name: "Generate UUID"
        run: |
          echo UUID=$(uuidgen | cut -d "-" -f1) >> $GITHUB_ENV
      - run: echo "UUID ${{ env.UUID }}"

      - name: "Test enrollment"
        uses: ./.github/actions/acme_clients
        with:
          TEST_ADL: "true"
          USE_RSA: "true"
          USE_CERTBOT: "false"
          HOSTNAME_SUFFIX: -${{ env.UUID }}

      - name: "ACME Profiling - Setup a2c with dogtag_ca_handler"
        run: |
          # disable challenge validation to avoid issues with profile tests
          sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: True/g" data/volume/acme_srv.cfg
          sudo sed -i "s/tnauthlist_support: False/tnauthlist_support: False\nprofiles={\"caServerCert\": \"http:\/\/foo.bar\/caservercert\", \"Webserver\": \"http:\/\/foo.bar\/webserver\", \"profile3\": \"http:\/\/foo.bar\/profile3\"}/g" data/volume/acme_srv.cfg

      - name: "Reconfigure a2c "
        run: |
          docker exec acme-srv bash /tmp/acme2certifier/$EXECSRIPT restart $WEBSRV
        env:
          WEBSRV: ${{ matrix.websrv }}
          EXECSRIPT: ${{ matrix.execscript }}

      - name: "ACME Profiling - Test enrollment"
        uses: ./.github/actions/wf_specific/dogtag_ca_handler/enroll_acmeprofile

      - name: "EAB Profiling - Setup a2c with dogtag_ca_handler"
        run: |
          sudo echo -e "\n[EABhandler]" >> data/volume/acme_srv.cfg
          sudo echo "eab_handler_file: /var/www/acme2certifier/examples/eab_handler/kid_profile_handler.py" >> data/volume/acme_srv.cfg
          sudo echo "key_file: /var/www/acme2certifier/volume/acme_ca/kid_profiles.json" >> data/volume/acme_srv.cfg
          sudo echo "eab_profiling: True" >> data/volume/acme_srv.cfg

          sudo cp examples/eab_handler/kid_profiles.json data/volume/acme_ca/kid_profiles.json
          sudo sed -i '29,33d' data/volume/acme_ca/kid_profiles.json
          sudo sed -i '20,22d' data/volume/acme_ca/kid_profiles.json
          sudo sed -i "s/\"profile_id\"\: \[\"profile_1\", \"profile_2\", \"profile_3\"\]/\"profile\"\: \[\"Webserver\", \"caServerCert\"\, \"100\"]/g" data/volume/acme_ca/kid_profiles.json
          sudo sed -i "s/\"profile_id\"\: \"profile_2\"/\"profile\"\: \"Webserver\"/g" data/volume/acme_ca/kid_profiles.json
          sudo sed -i "s/\"ca_name\": \"example_ca_2\",/\"unknown_key\": \"unknown_value\"/" data/volume/acme_ca/kid_profiles.json
          sudo sed -i "s/\"ca_name\": \"example_ca\",/\"unknown_key\": \"unknown_value\"/g" data/volume/acme_ca/kid_profiles.json
          sudo sed -i "s/example.net/acme/g" data/volume/acme_ca/kid_profiles.json
          sudo sed -i '18,19d' data/volume/acme_ca/kid_profiles.json
          sudo sed -i '8,9d' data/volume/acme_ca/kid_profiles.json

      - name: "Reconfigure a2c "
        run: |
          docker exec acme-srv bash /tmp/acme2certifier/$EXECSRIPT restart $WEBSRV
        env:
          WEBSRV: ${{ matrix.websrv }}
          EXECSRIPT: ${{ matrix.execscript }}

      - name: "EAB Profiling - Test enrollment"
        uses: ./.github/actions/wf_specific/dogtag_ca_handler/enroll_eabprofile

      - name: "[ * ] Collecting test logs"
        if: ${{ failure() }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/upload
          docker exec acme-srv tar cvfz /tmp/acme2certifier/a2c.tgz /var/www/acme2certifier
          sudo cp -rp data/ ${{ github.workspace }}/artifact/data/
          sudo rm ${{ github.workspace }}/artifact/data/*.deb
          if [ ${{ matrix.websrv }} == "apache2" ]; then
            docker exec acme-srv cat /var/log/apache2/error.log > ${{ github.workspace }}/artifact/acme-srv.log
          else
            docker exec acme-srv cat /var/log/nginx/error.log > ${{ github.workspace }}/artifact/acme-srv.log
          fi
          docker exec acme-srv cat /var/log/syslog > ${{ github.workspace }}/artifact/syslog
          sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz data acme-srv.log syslog

      - name: "[ * ] Uploading artifacts"
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: test-deb-${{ matrix.websrv }}-${{ matrix.execscript }}.tar.gz
          path: ${{ github.workspace }}/artifact/upload/