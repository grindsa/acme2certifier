name: build
on:

  push:
    branches: [ "**" ]       # build on any branch
  workflow_dispatch: {}
  schedule:
    - cron: '0 02 * * 6'  # Every Saturday at 4:00am


jobs:
  # ---------------------------------------------------------
  # Job 1: Build four container images (matrix) and push to GHCR
  # ---------------------------------------------------------
  build-containers:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    if: github.repository == 'grindsa/acme2certifier' && !startsWith(github.ref_name, 'wf_')
    strategy:
      fail-fast: false
      matrix:
        websrv: ['apache2', 'nginx']
        dbhandler: ['wsgi', 'django']
    steps:
      - uses: actions/checkout@v6
      - name: "Build container"
        uses: ./.github/actions/container_build_upload
        with:
          DB_HANDLER: ${{ matrix.dbhandler }}
          WEB_SRV: ${{ matrix.websrv }}

  # ---------------------------------------------------------
  # Job 2: Build RPM and upload artifacts
  # ---------------------------------------------------------
  build-rpm:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    if: github.repository == 'grindsa/acme2certifier' && !startsWith(github.ref_name, 'wf_')
    steps:
      - uses: actions/checkout@v6
      - name: "Build rpm package"
        id: rpm_build
        uses: ./.github/actions/rpm_build_upload


  # ---------------------------------------------------------
  # Job 3: Build one DEB and upload artifact
  # ---------------------------------------------------------
  build-deb:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    if: github.repository == 'grindsa/acme2certifier' && !startsWith(github.ref_name, 'wf_')
    steps:
      - uses: actions/checkout@v6
      - name: "deb build and upload"
        uses: ./.github/actions/deb_build_upload
        with:
          NO_VERSION: "true"

  # ---------------------------------------------------------
  # Dispatch tests with full payload (branch/ref-safe)
  # ---------------------------------------------------------
  dispatch:
    runs-on: ubuntu-latest
    needs: [ build-containers, build-rpm, build-deb ]
    permissions:
      contents: read
      actions: read
      deployments: write
    if: github.repository == 'grindsa/acme2certifier' && !startsWith(github.ref_name, 'wf_')
    steps:
      - name: Dispatch repository event
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GH_WF_TOKEN }}
          event-type: artifacts_ready
          client-payload: >-
            {
              "sha":        "${{ github.sha }}",
              "branch":     "${{ github.ref_name }}",
              "full_ref":   "${{ github.ref }}",
              "run_id":     "${{ github.run_id }}",
              "called_by_workflow": "${{ github.workflow }}"
            }
