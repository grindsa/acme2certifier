name: CA handler tests - ACME

on:
  push:
  pull_request:
    branches: [ devel ]
  schedule:
    - cron:  '0 2 * * 6'

jobs:
  container_build:
    name: "container_build"
    runs-on: ubuntu-latest
    # Prevent workflows from running in forks
    if: github.repository == 'grindsa/acme2certifier'
    strategy:
      fail-fast: false
      matrix:
        websrv: ['apache2']
        dbhandler: ['wsgi']

    steps:
    - name: "checkout GIT"
      uses: actions/checkout@v4

    - name: "Build container"
      uses: ./.github/actions/container_build_upload
      with:
        DB_HANDLER: ${{ matrix.dbhandler }}
        WEB_SRV: ${{ matrix.websrv }}

  acme_ca_handler_dns_test:
    name: "acme_ca_handler_dns_test"
    runs-on: ubuntu-latest
    # Prevent workflows from running in forks
    if: github.repository == 'grindsa/acme2certifier'
    needs: container_build
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        websrv: ['apache2']
        dbhandler: ['wsgi']

    steps:
    - name: "checkout GIT"
      uses: actions/checkout@v4

    - name: "Parse JSON secret - ACMEDNS_CFG"
      uses: ./.github/actions/parse-json-secret
      with:
        json_secret: ${{ secrets.ACMEDNS_CFG }}

    - name: "Parse JSON secret - CF_CFG"
      uses: ./.github/actions/parse-json-secret
      with:
        json_secret: ${{ secrets.CF_CFG }}

    - name: "Download container"
      uses: actions/download-artifact@v4
      with:
        name: a2c-${{ github.run_id }}.${{ matrix.websrv }}.${{ matrix.dbhandler }}.tar.gz
        path: /tmp

    - name: "Import container"
      run: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --batch --yes --no-tty --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
        sudo apt update
        sudo apt install -y docker-compose-plugin
        gunzip /tmp/a2c-${{ github.run_id }}.${{ matrix.websrv }}.${{ matrix.dbhandler }}.tar.gz
        docker load -i /tmp/a2c-${{ github.run_id }}.${{ matrix.websrv }}.${{ matrix.dbhandler }}.tar
        docker images

    - name: "Prepare container environment"
      uses: ./.github/actions/container_prep
      with:
        DB_HANDLER: ${{ matrix.dbhandler }}
        WEB_SRV: ${{ matrix.websrv }}
        CONTAINER_BUILD: false
        NAME_SPACE: acme.dynamop.de

    - name: "CloudFlare - Setup acme ca_handler"
      run: |
        sudo mkdir -p examples/Docker/data/acme
        sudo chmod -R 777 examples/Docker/data/acme
        sudo curl https://raw.githubusercontent.com/acmesh-official/acme.sh/refs/heads/master/acme.sh --output examples/Docker/data/acme/acme.sh
        sudo curl https://raw.githubusercontent.com/acmesh-official/acme.sh/refs/heads/master/dnsapi/dns_cf.sh --output examples/Docker/data/acme/dns_cf.sh
        sudo chmod a+x examples/Docker/data/acme/*.sh
        sudo cp .github/openssl_ca_handler.py_acme_srv_default_handler.cfg examples/Docker/data/acme_srv.cfg
        sudo chmod 777 examples/Docker/data/acme_srv.cfg
        sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > examples/Docker/data/acme_srv.cfg
        sudo echo "handler_file: examples/ca_handler/acme_ca_handler.py" >> examples/Docker/data/acme_srv.cfg
        sudo echo "acme_keyfile: volume/acme/le_staging_private_key.json" >> examples/Docker/data/acme_srv.cfg
        sudo echo "acme_url: https://acme-staging-v02.api.letsencrypt.org" >> examples/Docker/data/acme_srv.cfg
        sudo echo "acme_account_email: grindelsack@gmail.com" >> examples/Docker/data/acme_srv.cfg
        sudo echo "acme_sh_script: volume/acme/acme.sh" >> examples/Docker/data/acme_srv.cfg
        sudo echo "dns_update_script: volume/acme/dns_cf.sh" >> examples/Docker/data/acme_srv.cfg
        sudo echo "dns_update_script_variables: {\"CF_Token\": \"$CF_TOKEN\", \"CF_Zone_ID\": \"$CF_ZONE_ID\"}" >> examples/Docker/data/acme_srv.cfg
        sudo echo "acme_sh_shell: /bin/bash" >> examples/Docker/data/acme_srv.cfg
        sudo echo "dns_validation_timeout: 20" >> examples/Docker/data/acme_srv.cfg
        sudo echo "enrollment_config_log: True" >> examples/Docker/data/acme_srv.cfg
        sudo echo "profiles_sync: True" >> examples/Docker/data/acme_srv.cfg
        sudo echo "renewalinfo_lookup: True" >> examples/Docker/data/acme_srv.cfg
        sudo echo "allowed_domainlist: [\"bar.local\", \"*.acme.dynamop.de\"]" >> examples/Docker/data/acme_srv.cfg
        sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: True/g" examples/Docker/data/acme_srv.cfg
        # sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout: 15/g" examples/Docker/data/acme_srv.cfg

      env:
        CF_TOKEN: ${{ env.CF_TOKEN }}
        CF_ZONE_ID: ${{ env.CF_ZONE_ID }}

    - name: "CloudFlare - Bring up a2c container"
      uses: ./.github/actions/container_up
      with:
        DB_HANDLER: ${{ matrix.dbhandler }}
        WEB_SRV: ${{ matrix.websrv }}
        NAME_SPACE: acme.dynamop.de

    - name: "Compare profile information"
      uses: ./.github/actions/wf_specific/acme_ca_handler/compare_profile_info
      with:
        NAME_SPACE: acme.dynamop.de

    - name: "Generate UUID"
      run: |
        echo UUID=$(uuidgen | cut -d "-" -f1) >> $GITHUB_ENV
    - run: echo "UUID ${{ env.UUID }}"

    #- name: "Enrollment"
    #  uses: ./.github/actions/wf_specific/acme_ca_handler/enroll_dns
    #  with:
    #    HOSTNAME_SUFFIX: -${{ env.UUID }}
    #    NAME_SPACE: acme.dynamop.de
    #    CERT_TIMEOUT: "360"
    #    VERIFY_CERT: false

    - name: "Compare renewal information between A2C and LE"
      uses: ./.github/actions/wf_specific/acme_ca_handler/compare_renewal_info
      with:
        NAME_SPACE: acme.dynamop.de
        HOSTNAME_SUFFIX: -${{ env.UUID }}
        CERTIFICATE_FILE: "lego/certificates/lego-${{ env.UUID }}.acme.dynamop.de.crt"

    - name: "ACMEDNS - Setup acme ca_handler"
      run: |
        sudo mkdir -p examples/Docker/data/acme
        sudo chmod -R 777 examples/Docker/data/acme
        sudo curl https://raw.githubusercontent.com/acmesh-official/acme.sh/refs/heads/master/acme.sh --output examples/Docker/data/acme/acme.sh
        sudo curl https://raw.githubusercontent.com/acmesh-official/acme.sh/refs/heads/master/dnsapi/dns_acmedns.sh --output examples/Docker/data/acme/dns_acmedns.sh
        sudo chmod a+x examples/Docker/data/acme/*.sh
        sudo cp .github/openssl_ca_handler.py_acme_srv_default_handler.cfg examples/Docker/data/acme_srv.cfg
        sudo chmod 777 examples/Docker/data/acme_srv.cfg
        sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > examples/Docker/data/acme_srv.cfg
        sudo echo "handler_file: examples/ca_handler/acme_ca_handler.py" >> examples/Docker/data/acme_srv.cfg
        sudo echo "acme_keyfile: volume/acme/le_staging_private_key.json" >> examples/Docker/data/acme_srv.cfg
        sudo echo "acme_url: https://acme-staging-v02.api.letsencrypt.org" >> examples/Docker/data/acme_srv.cfg
        sudo echo "acme_account_email: grindelsack@gmail.com" >> examples/Docker/data/acme_srv.cfg
        sudo echo "acme_sh_script: volume/acme/acme.sh" >> examples/Docker/data/acme_srv.cfg
        sudo echo "dns_update_script: volume/acme/dns_acmedns.sh" >> examples/Docker/data/acme_srv.cfg
        sudo echo "dns_update_script_variables: {\"ACMEDNS_USERNAME\": \"$ACMEDNS_USERNAME\", \"ACMEDNS_PASSWORD\": \"$ACMEDNS_PASSWORD\", \"ACMEDNS_BASE_URL\": \"https://auth.acme-dns.io\", \"ACMEDNS_SUBDOMAIN\": \"$ACMEDNS_SUBDOMAIN\"}" >> examples/Docker/data/acme_srv.cfg
        sudo echo "acme_sh_shell: /bin/bash" >> examples/Docker/data/acme_srv.cfg
        sudo echo "dns_validation_timeout: 30" >> examples/Docker/data/acme_srv.cfg
        sudo echo "enrollment_config_log: True" >> examples/Docker/data/acme_srv.cfg
        sudo echo "allowed_domainlist: [\"bar.local\", \"*.acme.dynamop.de\"]" >> examples/Docker/data/acme_srv.cfg
        sudo echo "profiles_sync: True" >> examples/Docker/data/acme_srv.cfg
        sudo echo "renewalinfo_lookup: True" >> examples/Docker/data/acme_srv.cfg
        sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: True/g" examples/Docker/data/acme_srv.cfg
        sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout: 15/g" examples/Docker/data/acme_srv.cfg

        cd examples/Docker/
        docker compose restart
      env:
        ACMEDNS_USERNAME: ${{ env.ACMEDNS_USERNAME }}
        ACMEDNS_PASSWORD: ${{ env.ACMEDNS_PASSWORD }}
        ACMEDNS_SUBDOMAIN: ${{ env.ACMEDNS_SUBDOMAIN }}

    - name: "ACMEDNS - WC - Enrollment"
      uses: ./.github/actions/wf_specific/acme_ca_handler/enroll_dns_wc
      with:
        NAME_SPACE: acme.dynamop.de
        CERT_TIMEOUT: 360
        VERIFY_CERT: false

    - name: "Check acme account found in keyfile"
      run: |
        cd examples/Docker
        docker compose logs | grep -i "found in keyfile"

    - name: "Check container configuration"
      uses: ./.github/actions/container_check
      with:
        DB_HANDLER: ${{ matrix.dbhandler }}
        WEB_SRV: ${{ matrix.websrv }}

    - name: "[ * ] collecting test data"
      if: ${{ failure() }}
      run: |
        mkdir -p ${{ github.workspace }}/artifact/upload
        sudo cp -rp examples/Docker/data/ ${{ github.workspace }}/artifact/data/
        cd examples/Docker
        docker compose logs > ${{ github.workspace }}/artifact/docker-compose.log
        sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz data docker-compose.log

    - name: "[ * ] uploading artifacts"
      uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: acme_ca_handler_dns_test-${{ matrix.websrv }}-${{ matrix.dbhandler }}.tar.gz
        path: ${{ github.workspace }}/artifact/upload/

  cleanup:
    name: "cleanup"
    runs-on: ubuntu-latest
    # Prevent workflows from running in forks
    if: github.repository == 'grindsa/acme2certifier'
    needs: [acme_ca_handler_dns_test]
    strategy:
      fail-fast: false
      matrix:
        websrv: ['apache2', 'nginx']
        dbhandler: ['wsgi', 'django']

    steps:
    - uses: geekyeggo/delete-artifact@v5
      with:
        name: a2c-${{ github.run_id }}.${{ matrix.websrv }}.${{ matrix.dbhandler }}.tar.gz

  rpm_build_and_upload:
    name: "rpm_build_and_upload"
    runs-on: ubuntu-latest
    # Prevent workflows from running in forks
    if: github.repository == 'grindsa/acme2certifier'
    steps:
    - name: "checkout GIT"
      uses: actions/checkout@v4

    - name: "Build rpm package"
      id: rpm_build
      uses: ./.github/actions/rpm_build_upload

  rpm_acme_ca_handler_dns_test:
    name: "rpm_acme_ca_handler_dns_test"
    runs-on: ubuntu-latest
    # Prevent workflows from running in forks
    if: github.repository == 'grindsa/acme2certifier'
    needs: [rpm_build_and_upload]
    strategy:
      fail-fast: false
      matrix:
        rhversion: [8, 9]

    steps:
    - name: "checkout GIT"
      uses: actions/checkout@v4

    - name: "Parse JSON secret - CF_CFG"
      uses: ./.github/actions/parse-json-secret
      with:
        json_secret: ${{ secrets.CF_CFG }}

    - name: "Parse JSON secret - GH_CFG"
      uses: ./.github/actions/parse-json-secret
      with:
        json_secret: ${{ secrets.GH_CFG }}

    - name: "Prepare Alma environment"
      uses: ./.github/actions/rpm_prep
      with:
        GH_USER: ${{ env.GH_USER }}
        GH_SBOM_REPO_TOKEN: ${{ env.GH_SBOM_REPO_TOKEN }}
        RH_VERSION: ${{ matrix.rhversion }}
        RPM_BUILD: false
        NAME_SPACE: acme.dynamop.de

    - name: Download rpm package
      uses: actions/download-artifact@v4
      with:
        name: acme2certifier-${{ github.run_id }}.noarch.rpm
        path: data/

    - name: "Prepare setup acme_ca_handler"
      run: |
        sudo mkdir -p data/acme_ca
        sudo curl https://raw.githubusercontent.com/acmesh-official/acme.sh/refs/heads/master/acme.sh --output data/acme_ca/acme.sh
        sudo curl https://raw.githubusercontent.com/acmesh-official/acme.sh/refs/heads/master/dnsapi/dns_cf.sh --output data/acme_ca/dns_cf.sh
        sudo chmod a+x data/acme_ca/*.sh
        sudo cp .github/openssl_ca_handler.py_acme_srv_default_handler.cfg data/acme_srv.cfg
        sudo chmod 777 data/acme_srv.cfg

        sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > data/acme_srv.cfg
        sudo echo "handler_file: examples/ca_handler/acme_ca_handler.py" >> data/acme_srv.cfg
        sudo echo "acme_keyfile: /opt/acme2certifier/volume/le_staging_private_key.json" >> data/acme_srv.cfg
        sudo echo "acme_url: https://acme-staging-v02.api.letsencrypt.org" >> data/acme_srv.cfg
        sudo echo "acme_account_email: grindelsack@gmail.com" >> data/acme_srv.cfg
        sudo echo "acme_sh_script: /opt/acme2certifier/volume/acme_ca/acme.sh" >> data/acme_srv.cfg
        sudo echo "dns_update_script: /opt/acme2certifier/volume/acme_ca/dns_cf.sh" >> data/acme_srv.cfg
        sudo echo "dns_update_script_variables: {\"CF_Token\": \"$CF_TOKEN\", \"CF_Zone_ID\": \"$CF_ZONE_ID\"}" >> data/acme_srv.cfg
        sudo echo "acme_sh_shell: /bin/bash" >> data/acme_srv.cfg
        sudo echo "dns_validation_timeout: 30" >> data/acme_srv.cfg
        sudo echo "enrollment_config_log: True" >> data/acme_srv.cfg
        sudo echo "profiles_sync: True" >> data/acme_srv.cfg
        sudo echo "renewalinfo_lookup: True" >> data/acme_srv.cfg
        sudo echo "allowed_domainlist: [\"bar.local\", \"*.acme.dynamop.de\"]" >> data/acme_srv.cfg
        sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: True/g" data/acme_srv.cfg
      env:
        CF_TOKEN: ${{ env.CF_TOKEN }}
        CF_ZONE_ID: ${{ env.CF_ZONE_ID }}

    - name: "Run Execute install scipt"
      run: |
        docker exec acme-srv sh /tmp/acme2certifier/rpm_tester.sh

    - name: "Generate UUID"
      run: |
        echo UUID=$(uuidgen | cut -d "-" -f1) >> $GITHUB_ENV
    - run: echo "UUID ${{ env.UUID }}"

    - name: "Enrollment"
      uses: ./.github/actions/wf_specific/acme_ca_handler/enroll_dns
      with:
        HOSTNAME_SUFFIX: -${{ env.UUID }}
        NAME_SPACE: acme.dynamop.de
        CERT_TIMEOUT: 300
        VERIFY_CERT: false

    - name: "Check acme account found in keyfile"
      run: |
        # docker exec acme-srv grep -i "found in keyfile" /var/log/messages
        docker exec acme-srv bash -c "grep -i \"found in keyfile\" /var/log/messages"

    - name: "[ * ] collecting test logs"
      if: ${{ failure() }}
      run: |
        mkdir -p ${{ github.workspace }}/artifact/upload
        docker exec acme-srv tar cvfz /tmp/acme2certifier/a2c.tgz /opt/acme2certifier
        sudo cp -rp data/ ${{ github.workspace }}/artifact/data/
        sudo rm ${{ github.workspace }}/artifact/data/*.rpm
        docker exec acme-srv cat /etc/nginx/nginx.conf.orig > ${{ github.workspace }}/artifact/data/nginx.conf.orig
        docker exec acme-srv cat /etc/nginx/nginx.conf > ${{ github.workspace }}/artifact/data/nginx.conf
        docker exec acme-srv cat /var/log/messages > ${{ github.workspace }}/artifact/acme-srv.log
        sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz data acme-srv.log

    - name: "[ * ] uploading artificates"
      uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: rpm_acme_ca_handler_dns_test-rh${{ matrix.rhversion }}.tar.gz
        path: ${{ github.workspace }}/artifact/upload/

  rpm_cleanup:
    name: "rpm_cleanup"
    runs-on: ubuntu-latest
    # Prevent workflows from running in forks
    if: github.repository == 'grindsa/acme2certifier'
    needs: [rpm_acme_ca_handler_dns_test]
    steps:
    - name: "Delete artifact"
      uses: geekyeggo/delete-artifact@v5
      with:
        name: acme2certifier-${{ github.run_id }}.noarch.rpm
