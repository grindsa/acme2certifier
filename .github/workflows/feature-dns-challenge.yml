name: Feature Tests - DNS Challenge
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run the workflow on'
        required: true
        default: 'main'
      run_id:
        description: 'Run ID of the producing workflow'
        required: true
        default: '0'
      sha:
        description: 'SHA of the commit to run the workflow on'
        required: true
        default: ''
      called_by_workflow:
        description: 'Name of the producing workflow'
        required: true
        default: 'manual-trigger'
      full_ref:
        description: 'Full git ref of the commit to run the workflow on'
        required: false
        default: ''

jobs:

  # ---------------------------------------------------------
  # Quick guard to validate incoming payload
  # ---------------------------------------------------------
  guard:
    runs-on: ubuntu-latest
    if: ${{ inputs.sha != '' && inputs.run_id != '' && inputs.branch != '' && github.repository == 'grindsa/acme2certifier' }}
    steps:
      - run: |
          echo "Triggered by SHA:    $SHA"
          echo "From branch:         $BRANCH"
          echo "Producer run_id:     $RUN_ID"
        env:
          SHA: ${{ inputs.sha }}
          BRANCH: ${{ inputs.branch }}
          RUN_ID: ${{ inputs.run_id }}

  # ---------------------------------------------------------
  # Test container images (matrix from payload)
  # ---------------------------------------------------------
  test-containers:
    needs: guard
    runs-on: ubuntu-latest
    if: github.repository == 'grindsa/acme2certifier'
    strategy:
      fail-fast: false
      matrix:
        websrv: ['apache2', 'nginx']
        dbhandler: ['wsgi', 'django']

    steps:
      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: "Download and import container"
        uses: ./.github/actions/container_load
        with:
          RUN_ID: ${{ inputs.run_id }}
          ARTIFACT_NAME: a2c-${{ inputs.run_id }}.${{ matrix.websrv }}.${{ matrix.dbhandler }}.tar
          DESTINATION_PATH: /tmp
          TOKEN: ${{ secrets.GH_WF_TOKEN }}
          REPO: ${{ github.repository }}

      - name: "Prepare container environment"
        uses: ./.github/actions/container_prep
        with:
          DB_HANDLER: ${{ matrix.dbhandler }}
          WEB_SRV: ${{ matrix.websrv }}
          CONTAINER_BUILD: false
          NAME_SPACE: acme

      - name: "Setup openssl ca_handler"
        run: |
          sudo mkdir -p examples/Docker/data/acme_ca/certs
          sudo cp test/ca/sub-ca-key.pem test/ca/sub-ca-crl.pem test/ca/sub-ca-cert.pem test/ca/root-ca-cert.pem examples/Docker/data/acme_ca/
          sudo cp .github/openssl_ca_handler.py_acme_srv_choosen_handler.cfg examples/Docker/data/acme_srv.cfg
          sudo chmod 777 examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: False\ndns_server_list: [\"DNS-IP\"]/g" examples/Docker/data/acme_srv.cfg

      - name: "Bring up a2c container"
        uses: ./.github/actions/container_up
        with:
          DB_HANDLER: ${{ matrix.dbhandler }}
          WEB_SRV: ${{ matrix.websrv }}

      - name: "Prepare acme.sh container and set DNS server in acme_srv.cfg"
        uses: ./.github/actions/wf_specific/dns/acmesh_prep
        with:
          DEPLOYMENT_TYPE: container
          ACME_SRV_CFG: data/acme_srv.cfg

      - name: "Enroll by using dns-01 challenges"
        uses: ./.github/actions/wf_specific/dns/enroll_dns01
        with:
          CA_PATH: examples/Docker/data/acme_ca/
          DEPLOYMENT_TYPE: container

      - name: "Setup openssl ca_handler for persistent-01 challenge support"
        run: |
          echo -e "[Directory]\ncaaidentities: [\"acme.local\", \"acme-srv.acme\"]" >> examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: False\ndns_persist_01_support: True/g" examples/Docker/data/acme_srv.cfg
          cd examples/Docker/
          docker compose restart

      - name: "Register lego container and create dns records for persistent-01 challenges"
        uses: ./.github/actions/wf_specific/dns/persistent_prep
        with:
          DEPLOYMENT_TYPE: container

      - name: "Enroll by using persistent-01 dns challenges (to fail)"
        uses: ./.github/actions/wf_specific/dns/enroll_persistent01
        with:
          CA_PATH: examples/Docker/data/acme_ca/
          DEPLOYMENT_TYPE: container
          TO_FAIL: 'true'

      - name: "Enable Wildcard support"
        run: |
          sudo sed -i "s/dns_persist_01_support: True/dns_persist_01_support: True\ndns_persist_allow_policy_wildcard: True/g" examples/Docker/data/acme_srv.cfg
          cd examples/Docker/
          docker compose restart

      - name: "Enroll by using persistent-01 dns challenges (not to fail)"
        uses: ./.github/actions/wf_specific/dns/enroll_persistent01
        with:
          CA_PATH: examples/Docker/data/acme_ca/
          DEPLOYMENT_TYPE: container

      - name: "Enable JIT support"
        run: |
          sudo sed -i "s/dns_persist_allow_policy_wildcard: True/dns_persist_allow_policy_wildcard: True\ndns_persist_jit_validation: True/g" examples/Docker/data/acme_srv.cfg
          cd examples/Docker/
          docker compose restart

      - name: "Enroll by using persistent-01 dns challenges (not to fail)"
        uses: ./.github/actions/wf_specific/dns/enroll_persistent01
        with:
          CA_PATH: examples/Docker/data/acme_ca/
          DEPLOYMENT_TYPE: container
          CHECK_JIT: 'true'

      - name: "[ * ] Collecting test logs"
        if: ${{ failure() }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/upload
          sudo cp -rp examples/Docker/data/ ${{ github.workspace }}/artifact/data/
          cd examples/Docker
          docker compose logs > ${{ github.workspace }}/artifact/docker-compose.log
          sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz docker-compose.log data

      - name: "[ * ] Uploading artifacts"
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: container-tests-${{ matrix.websrv }}-${{ matrix.dbhandler }}.tar.gz
          path: ${{ github.workspace }}/artifact/upload/

  # ---------------------------------------------------------
  # Test RPMs (EL8 & EL9) downloaded from the producer run
  # ---------------------------------------------------------
  test-rpm:
    needs: guard
    runs-on: ubuntu-latest
    if: github.repository == 'grindsa/acme2certifier'
    strategy:
      fail-fast: false
      matrix:
        rhversion: [8, 9]
        execscript: ['rpm_tester.sh', 'django_tester.sh']

    steps:
      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: "Parse JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.GH_CFG }}

      - name: "Prepare Alma environment"
        uses: ./.github/actions/rpm_prep
        with:
          GH_USER: ${{ env.GH_USER }}
          GH_SBOM_REPO_TOKEN: ${{ env.GH_SBOM_REPO_TOKEN }}
          RH_VERSION: ${{ matrix.rhversion }}
          RPM_BUILD: false

      - name: "Download RPM artifact by name from build run"
        uses: ./.github/actions/download_artifact
        with:
          RUN_ID: ${{ inputs.run_id }}
          ARTIFACT_NAME: acme2certifier-${{ inputs.run_id }}.noarch.rpm
          DESTINATION_PATH: data/
          TOKEN: ${{ secrets.GH_WF_TOKEN }}
          REPO: ${{ github.repository }}

      - name: "Prepare acme_srv.cfg with openssl_ca_handler"
        run: |
          mkdir -p data/volume/acme_ca/certs
          sudo mkdir -p examples/Docker/data/acme_ca/certs
          sudo cp test/ca/sub-ca-key.pem test/ca/sub-ca-crl.pem test/ca/sub-ca-cert.pem test/ca/root-ca-cert.pem data/volume/acme_ca/
          sudo cp .github/openssl_ca_handler.py_acme_srv_default_handler.cfg data/volume/acme_srv.cfg
          sudo chmod 777 data/volume/acme_srv.cfg
          sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: False\ndns_server_list: [\"DNS-IP\"]/g" data/volume/acme_srv.cfg
          sudo sed -i "s/\[CAhandler\]/\[CAhandler\]\nhandler_file: \/opt\/acme2certifier\/examples\/ca_handler\/openssl_ca_handler.py/g" data/volume/acme_srv.cfg

      - name: "Prepare acme.sh container and set DNS server in acme_srv.cfg"
        uses: ./.github/actions/wf_specific/dns/acmesh_prep

      - name: "Execute install scipt"
        run: |
          docker exec acme-srv sh /tmp/acme2certifier/$EXEC_SCRIPT
        env:
          EXEC_SCRIPT: ${{ matrix.execscript }}

      - name: "Enroll by using dns-01 challenges"
        uses: ./.github/actions/wf_specific/dns/enroll_dns01

      - name: "Setup openssl ca_handler for persistent-01 challenge support"
        run: |
          echo -e "[Directory]\ncaaidentities: [\"acme.local\", \"acme-srv.acme\"]" >> data/volume/acme_srv.cfg
          sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: False\ndns_persist_01_support: True/g" data/volume/acme_srv.cfg

      - name: "Reconfigure a2c"
        run: |
          docker exec acme-srv sh /tmp/acme2certifier/$EXEC_SCRIPT  restart
        env:
          EXEC_SCRIPT: ${{ matrix.execscript }}

      - name: "Register lego container and create dns records for persistent-01 challenges"
        uses: ./.github/actions/wf_specific/dns/persistent_prep
        with:
          DEPLOYMENT_TYPE: container

      - name: "Enroll by using persistent-01 dns challenges (to fail)"
        uses: ./.github/actions/wf_specific/dns/enroll_persistent01
        with:
          CA_PATH: data/volume/acme_ca/
          DEPLOYMENT_TYPE: container
          TO_FAIL: 'true'

      - name: "Enable Wildcard support"
        run: |
          sudo sed -i "s/dns_persist_01_support: True/dns_persist_01_support: True\ndns_persist_allow_policy_wildcard: True/g" data/volume/acme_srv.cfg

      - name: "Reconfigure a2c"
        run: |
          docker exec acme-srv sh /tmp/acme2certifier/$EXEC_SCRIPT  restart
        env:
          EXEC_SCRIPT: ${{ matrix.execscript }}

      - name: "Enroll by using persistent-01 dns challenges (not to fail)"
        uses: ./.github/actions/wf_specific/dns/enroll_persistent01
        with:
          CA_PATH: data/volume/acme_ca/
          DEPLOYMENT_TYPE: container

      - name: "Enable JIT support"
        run: |
          sudo sed -i "s/dns_persist_allow_policy_wildcard: True/dns_persist_allow_policy_wildcard: True\ndns_persist_jit_validation: True/g" data/volume/acme_srv.cfg

      - name: "Reconfigure a2c"
        run: |
          docker exec acme-srv sh /tmp/acme2certifier/$EXEC_SCRIPT  restart
        env:
          EXEC_SCRIPT: ${{ matrix.execscript }}

      - name: "Enroll by using persistent-01 dns challenges (not to fail)"
        uses: ./.github/actions/wf_specific/dns/enroll_persistent01
        with:
          CA_PATH: data/volume/acme_ca/
          DEPLOYMENT_TYPE: rpm
          CHECK_JIT: 'true'

      - name: "[ * ] Collecting test logs"
        if: ${{ failure() }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/upload
          docker exec acme-srv tar cvfz /tmp/acme2certifier/a2c.tgz /opt/acme2certifier
          sudo cp -rp data/ ${{ github.workspace }}/artifact/data/
          sudo rm ${{ github.workspace }}/artifact/data/*.rpm
          sudo cp -rp acme-sh/ ${{ github.workspace }}/artifact/acme-sh/
          docker exec acme-srv cat /etc/nginx/nginx.conf.orig > ${{ github.workspace }}/artifact/data/nginx.conf.orig
          docker exec acme-srv cat /etc/nginx/nginx.conf > ${{ github.workspace }}/artifact/data/nginx.conf
          docker exec acme-srv cat /var/log/messages > ${{ github.workspace }}/artifact/acme-srv.log
          sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz data acme-srv.log acme-sh

      - name: "[ * ] Uploading artifacts"
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: test-rpm-rh${{ matrix.rhversion }}.tar.gz
          path: ${{ github.workspace }}/artifact/upload/

  # ---------------------------------------------------------
  # Test DEB downloaded from the producer run
  # ---------------------------------------------------------
  test-deb:
    needs: guard
    runs-on: ubuntu-latest
    if: github.repository == 'grindsa/acme2certifier'
    strategy:
      fail-fast: false
      matrix:
        websrv: ['apache2', 'nginx']
        execscript: ['deb_tester.sh','django_tester.sh']

    steps:
      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: "Parse XCA configuration from JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.XCA_CFG }}

      - name: "Prepare Ubuntu environment"
        if: matrix.execscript == 'deb_tester.sh'
        uses: ./.github/actions/deb_prep
        with:
          DEB_BUILD: false

      - name: "Prepare Ubuntu environment"
        if: matrix.execscript == 'django_tester.sh'
        uses: ./.github/actions/deb_prep
        with:
          DEB_BUILD: false
          DJANGO_DB: psql

      - name: "Download DEB artifact by name from build run"
        uses: ./.github/actions/download_artifact
        with:
          RUN_ID: ${{ inputs.run_id }}
          ARTIFACT_NAME: acme2certifier-${{ inputs.run_id }}-1_all.deb
          DESTINATION_PATH: data/
          TOKEN: ${{ secrets.GH_WF_TOKEN }}
          REPO: ${{ github.repository }}

      - name: "Prepare acme_srv.cfg with openssl_ca_handler"
        run: |
          mkdir -p data/volume/acme_ca/certs
          sudo mkdir -p examples/Docker/data/acme_ca/certs
          sudo cp test/ca/sub-ca-key.pem test/ca/sub-ca-crl.pem test/ca/sub-ca-cert.pem test/ca/root-ca-cert.pem data/volume/acme_ca/
          sudo cp .github/openssl_ca_handler.py_acme_srv_default_handler.cfg data/volume/acme_srv.cfg
          sudo chmod 777 data/volume/acme_srv.cfg
          sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: False\ndns_server_list: [\"DNS-IP\"]/g" data/volume/acme_srv.cfg
          sudo sed -i "s/\[CAhandler\]/\[CAhandler\]\nhandler_file: \/var\/www\/acme2certifier\/examples\/ca_handler\/openssl_ca_handler.py/g" data/volume/acme_srv.cfg
          sudo sed -i "s/volume/\/var\/www\/acme2certifier\/volume/g" data/volume/acme_srv.cfg

      - name: "Prepare acme.sh container and set DNS server in acme_srv.cfg"
        uses: ./.github/actions/wf_specific/dns/acmesh_prep

      - name: "Execute install script"
        run: |
          docker exec acme-srv bash /tmp/acme2certifier/$EXECSCRIPT install $WEBSRV
        env:
          WEBSRV: ${{ matrix.websrv }}
          EXECSCRIPT: ${{ matrix.execscript }}

      - name: "Enroll by using dns-01 challenges"
        uses: ./.github/actions/wf_specific/dns/enroll_dns01

      - name: "Setup openssl ca_handler for persistent-01 challenge support"
        run: |
          echo -e "[Directory]\ncaaidentities: [\"acme.local\", \"acme-srv.acme\"]" >> data/volume/acme_srv.cfg
          sudo sed -i "s/challenge_validation_disable: False/challenge_validation_disable: False\ndns_persist_01_support: True/g" data/volume/acme_srv.cfg

      - name: "Reconfigure a2c "
        run: |
          docker exec acme-srv bash /tmp/acme2certifier/$EXECSRIPT restart $WEBSRV
        env:
          WEBSRV: ${{ matrix.websrv }}
          EXECSRIPT: ${{ matrix.execscript }}

      - name: "Register lego container and create dns records for persistent-01 challenges"
        uses: ./.github/actions/wf_specific/dns/persistent_prep
        with:
          DEPLOYMENT_TYPE: container

      - name: "Enroll by using persistent-01 dns challenges (to fail)"
        uses: ./.github/actions/wf_specific/dns/enroll_persistent01
        with:
          CA_PATH: data/volume/acme_ca/
          DEPLOYMENT_TYPE: container
          TO_FAIL: 'true'

      - name: "Enable Wildcard support"
        run: |
          sudo sed -i "s/dns_persist_01_support: True/dns_persist_01_support: True\ndns_persist_allow_policy_wildcard: True/g" data/volume/acme_srv.cfg

      - name: "Reconfigure a2c "
        run: |
          docker exec acme-srv bash /tmp/acme2certifier/$EXECSRIPT restart $WEBSRV
        env:
          WEBSRV: ${{ matrix.websrv }}
          EXECSRIPT: ${{ matrix.execscript }}

      - name: "Enroll by using persistent-01 dns challenges (not to fail)"
        uses: ./.github/actions/wf_specific/dns/enroll_persistent01
        with:
          CA_PATH: data/volume/acme_ca/
          DEPLOYMENT_TYPE: container

      - name: "Enable JIT support"
        run: |
          sudo sed -i "s/dns_persist_allow_policy_wildcard: True/dns_persist_allow_policy_wildcard: True\ndns_persist_jit_validation: True/g" data/volume/acme_srv.cfg

      - name: "Reconfigure a2c "
        run: |
          docker exec acme-srv bash /tmp/acme2certifier/$EXECSRIPT restart $WEBSRV
        env:
          WEBSRV: ${{ matrix.websrv }}
          EXECSRIPT: ${{ matrix.execscript }}

      - name: "Enroll by using persistent-01 dns challenges (not to fail)"
        uses: ./.github/actions/wf_specific/dns/enroll_persistent01
        with:
          CA_PATH: data/volume/acme_ca/
          DEPLOYMENT_TYPE: deb
          CHECK_JIT: 'true'

      - name: "[ * ] Collecting test logs"
        if: ${{ failure() }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/upload
          docker exec acme-srv tar cvfz /tmp/acme2certifier/a2c.tgz /var/www/acme2certifier
          sudo cp -rp data/ ${{ github.workspace }}/artifact/data/
          sudo rm ${{ github.workspace }}/artifact/data/*.deb
          if [ ${{ matrix.websrv }} == "apache2" ]; then
            docker exec acme-srv cat /var/log/apache2/error.log > ${{ github.workspace }}/artifact/acme-srv.log
          else
            docker exec acme-srv cat /var/log/nginx/error.log > ${{ github.workspace }}/artifact/acme-srv.log
          fi
          docker exec acme-srv cat /var/log/syslog > ${{ github.workspace }}/artifact/syslog
          sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz data acme-srv.log syslog

      - name: "[ * ] Uploading artifacts"
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: test-deb-${{ matrix.websrv }}-${{ matrix.execscript }}.tar.gz
          path: ${{ github.workspace }}/artifact/upload/
