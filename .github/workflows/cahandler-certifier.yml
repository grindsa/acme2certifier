          sudo chmod 777 data/volume/acme_srv.cfg
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > data/volume/acme_srv.cfg
          sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout:15/g" data/volume/acme_srv.cfg
          sudo echo "handler_file: /var/www/acme2certifier/examples/ca_handler/cmp_ca_handler.py" >> data/volume/acme_srv.cfg
          sudo echo "cmp_path: pkix/" >> data/volume/acme_srv.cfg
          sudo echo "cmp_ignore_keyusage: True" >> data/volume/acme_srv.cfg
          sudo echo "cmp_msg_timeout: 3" >> data/volume/acme_srv.cfg
          sudo echo "cmp_total_timeout: 5" >> data/volume/acme_srv.cfg
          sudo echo "cmp_server: forwarder.acme:8080" >> data/volume/acme_srv.cfg
          sudo echo "cmp_cert: /var/www/acme2certifier/volume/acme_ca/ra_cert.pem" >> data/volume/acme_srv.cfg
          sudo echo "cmp_key: /var/www/acme2certifier/volume/acme_ca/ra_key.pem" >> data/volume/acme_srv.cfg
          sudo echo "cmp_trusted: /var/www/acme2certifier/volume/acme_ca/ca_bundle.pem" >> data/volume/acme_srv.cfg
          sudo echo "cmp_recipient: $CMP_RECIPIENT" >> data/volume/acme_srv.cfg
          sudo echo "allowed_domainlist: [\"bar.local\", \"*.acme\"]" >> data/volume/acme_srv.cfg
        env:
          RUNNER_IP: ${{ env.RUNNER_IP }}
          CMP_RECIPIENT: ${{ env.CMP_RECIPIENT }}
          CMP_RA_KEY: ${{ env.CMP_RA_KEY }}
          CMP_RA_CERT: ${{ env.CMP_RA_CERT }}
          CMP_TRUSTED: ${{ env.CMP_TRUSTED }}

      - name: "Execute install script"
        run: |
          docker exec acme-srv bash /tmp/acme2certifier/$EXECSCRIPT install $WEBSRV
        env:
          WEBSRV: ${{ matrix.websrv }}
          EXECSCRIPT: ${{ matrix.execscript }}

      - name: "Sleep for 10s"
        uses: juliangruber/sleep-action@v2.0.4
        with:
          time: 10s

      - name: "Test http://acme-srv/directory is accessible"
        run: docker run -i --rm --network acme curlimages/curl -f http://acme-srv/directory

      - name: "Test if https://acme-srv/directory is accessible"
        run: docker run -i --rm --network acme curlimages/curl --insecure -f https://acme-srv/directory

      - name: "Enroll acme.sh"
        run: |
          docker run --rm -i -v "$(pwd)/acme-sh":/acme.sh --network acme --name=acme-sh neilpang/acme.sh:latest --issue --server http://acme-srv --accountemail 'acme-sh@example.com' -d acme-sh.acme --alpn --standalone --debug 3 --output-insecure --force
          awk 'BEGIN {c=0;} /BEGIN CERT/{c++} { print > "cert-" c ".pem"}' < acme-sh/acme-sh.acme_ecc/ca.cer
          openssl verify -CAfile cert-2.pem -untrusted cert-1.pem acme-sh/acme-sh.acme_ecc/acme-sh.acme.cer

      - name: "Allowed domainlist feature - Enroll lego (fail)"
        continue-on-error: true
        id: legofail01
        run: |
          docker run -i --rm -v $PWD/lego:/.lego/ --name lego --network acme goacme/lego run -s  https://acme-srv --tls-skip-verify -a --email "lego@example.com" -d lego --tls

      - name: "Allowed domainlist feature - check  result "
        if: ${{ steps.legofail01.outcome != 'failure' }}
        run: |
          echo "legofail outcome is ${{steps.legofail01.outcome }}"
          exit 1

      - name: "Setup a2c with cmp_ca_handler"
        run: |
          sudo mkdir -p data/volume/acme_ca
          sudo cp test/ca/root-ca-cert.pem data/volume/acme_ca
          sudo cp test/ca/sub-ca-cert.pem data/volume/acme_ca
          sudo touch data/volume/acme_ca/ca_bundle.pem
          sudo touch data/volume/acme_ca/ra_cert.pem
          sudo chmod 777 data/volume/acme_ca/*.pem
          sudo echo "$CMP_TRUSTED" > data/volume/acme_ca/ca_bundle.pem
          sudo echo "$CMP_RA_CERT" > data/volume/acme_ca/ra_cert.pem
          sudo touch data/volume/acme_srv.cfg
          sudo chmod 777 data/volume/acme_srv.cfg
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > data/volume/acme_srv.cfg
          sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout:15/g" data/volume/acme_srv.cfg
          sudo echo "handler_file: /var/www/acme2certifier/examples/ca_handler/cmp_ca_handler.py" >> data/volume/acme_srv.cfg
          sudo echo "cmp_path: pkix/" >> data/volume/acme_srv.cfg
          sudo echo "cmp_ignore_keyusage: True" >> data/volume/acme_srv.cfg
          sudo echo "cmp_msg_timeout: 3" >> data/volume/acme_srv.cfg
          sudo echo "cmp_total_timeout: 5" >> data/volume/acme_srv.cfg
          sudo echo "cmp_server: forwarder.acme:8080" >> data/volume/acme_srv.cfg
          sudo echo "cmp_cert: /var/www/acme2certifier/volume/acme_ca/ra_cert.pem" >> data/volume/acme_srv.cfg
          sudo echo "cmp_trusted: /var/www/acme2certifier/volume/acme_ca/ca_bundle.pem" >> data/volume/acme_srv.cfg
          sudo echo "cmp_recipient: $CMP_RECIPIENT" >> data/volume/acme_srv.cfg
          sudo echo "cmp_ref: $CMP_REF" >> data/volume/acme_srv.cfg
          sudo echo "cmp_secret: $CMP_SECRET" >> data/volume/acme_srv.cfg
          sudo echo "allowed_domainlist: [\"bar.local\", \"*.acme\"]" >> data/volume/acme_srv.cfg
        env:
          RUNNER_IP: ${{ env.RUNNER_IP }}
          CMP_RECIPIENT: ${{ env.CMP_RECIPIENT }}
          CMP_RA_CERT: ${{ env.CMP_RA_CERT }}
          CMP_TRUSTED: ${{ env.CMP_TRUSTED }}
          CMP_REF: ${{ env.CMP_REF }}
          CMP_SECRET: ${{ env.CMP_SECRET }}

      - name: "Reconfigure a2c "
        run: |
          docker exec acme-srv bash /tmp/acme2certifier/$EXECSCRIPT restart $WEBSRV
        env:
          WEBSRV: ${{ matrix.websrv }}
          EXECSCRIPT: ${{ matrix.execscript }}

      - name: "Sleep for 10s"
        uses: juliangruber/sleep-action@v2.0.4
        with:
          time: 10s

      - name: "Test http://acme-srv/directory is accessible"
        run: docker run -i --rm --network acme curlimages/curl -f http://acme-srv/directory

      - name: "Test if https://acme-srv/directory is accessible"
        run: docker run -i --rm --network acme curlimages/curl --insecure -f https://acme-srv/directory

      - name: "Enroll acme.sh"
        run: |
          docker run --rm -i -v "$(pwd)/acme-sh":/acme.sh --network acme --name=acme-sh neilpang/acme.sh:latest --issue --server http://acme-srv --accountemail 'acme-sh@example.com' -d acme-sh.acme --alpn --standalone --debug 3 --output-insecure --force
          awk 'BEGIN {c=0;} /BEGIN CERT/{c++} { print > "cert-" c ".pem"}' < acme-sh/acme-sh.acme_ecc/ca.cer
          openssl verify -CAfile cert-2.pem -untrusted cert-1.pem acme-sh/acme-sh.acme_ecc/acme-sh.acme.cer

      - name: "Allowed domainlist feature - Enroll lego (fail)"
        continue-on-error: true
        id: legofail02
        run: |
          docker run -i --rm -v $PWD/lego:/.lego/ --name lego --network acme goacme/lego run -s  https://acme-srv --tls-skip-verify -a --email "lego@example.com" -d lego --tls

      - name: "Allowed domainlist feature - check  result "
        if: ${{ steps.legofail02.outcome != 'failure' }}
        run: |
          echo "legofail outcome is ${{steps.legofail02.outcome }}"
          exit 1

      - name: "Sleep for 10s"
        uses: juliangruber/sleep-action@v2.0.4
        with:
          time: 10s

      - name: "[ * ] Collecting test logs"
        if: ${{ failure() }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/upload
          docker exec acme-srv tar cvfz /tmp/acme2certifier/a2c.tgz /var/www/acme2certifier
          sudo cp -rp data/ ${{ github.workspace }}/artifact/data/
          sudo rm ${{ github.workspace }}/artifact/data/*.deb
          if [ ${{ matrix.websrv }} == "apache2" ]; then
            docker exec acme-srv cat /var/log/apache2/error.log > ${{ github.workspace }}/artifact/acme-srv.log
          else
            docker exec acme-srv cat /var/log/nginx/error.log > ${{ github.workspace }}/artifact/acme-srv.log
          fi
          docker exec acme-srv cat /var/log/syslog > ${{ github.workspace }}/artifact/syslog
          sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz data acme-srv.log syslog

      - name: "[ * ] Uploading artifacts"
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: test-cmpv2-deb-${{ matrix.websrv }}-${{ matrix.execscript }}.tar.gz
          path: ${{ github.workspace }}/artifact/upload/

  # ---------------------------------------------------------
  # stop instance
  # ---------------------------------------------------------
  instance_stop:
    needs: [guard, instance_start, test-containers, test-deb, test-rpm, test-cmpv2-containers, test-cmpv2-deb, test-cmpv2-rpm]
    runs-on: ubuntu-latest
    if: ${{ always() && github.repository == 'grindsa/acme2certifier' }}
    steps:
      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: "Parse AWS_CFG JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.AWS_CFG }}

      - name: "Parse NCM_CFG JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.NCM_CFG }}

      - name: "Prepare ssh environment in ramdisk"
        run: |
          sudo mkdir -p /tmp/rd
          sudo mount -t tmpfs -o size=5M none /tmp/rd
          sudo echo "$SSH_KEY" > /tmp/rd/ak.tmp
          sudo chmod 600 /tmp/rd/ak.tmp

      - name: "start ncm on remote instance"
        run: |
          ssh -o "StrictHostKeyChecking=no" -i /tmp/rd/ak.tmp ${{ env.SSH_USER }}@${{ env.SSH_HOST }} -p ${{ env.SSH_PORT }} "/usr/local/bin/ncm_mgr.sh stop"

      - name: "Stop AWS instance for testing"
        uses: ./.github/actions/aws_instance_manage
        with:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_INSTANCE_ID: ${{ env.AWS_X64-UB-01_INSTANCE_ID }}
          ACTION: "stop"
          IGNORE_CURRENT_STATUS: "false"
