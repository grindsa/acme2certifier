name: CA-Handler Tests - Insta Certifier
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run the workflow on'
        required: true
        default: 'main'
      run_id:
        description: 'Run ID of the producing workflow'
        required: true
        default: '0'
      sha:
        description: 'SHA of the commit to run the workflow on'
        required: true
        default: ''
      called_by_workflow:
        description: 'Name of the producing workflow'
        required: true
        default: 'manual-trigger'
      full_ref:
        description: 'Full git ref of the commit to run the workflow on'
        required: false
        default: ''
jobs:
  # ---------------------------------------------------------
  # Quick guard to validate incoming payload
  # ---------------------------------------------------------
  guard:
    runs-on: ubuntu-latest
    if: ${{ inputs.sha != '' && inputs.run_id != '' && inputs.branch != '' && github.repository == 'grindsa/acme2certifier' }}
    steps:
      - run: |
          echo "Triggered by SHA:    $SHA"
          echo "From branch:         $BRANCH"
          echo "Producer run_id:     $RUN_ID"
        env:
          SHA: ${{ inputs.sha }}
          BRANCH: ${{ inputs.branch }}
          RUN_ID: ${{ inputs.run_id }}

  # ---------------------------------------------------------
  # start instance
  # ---------------------------------------------------------
  instance_start:
    needs: guard
    runs-on: ubuntu-latest
    # if: ${{ github.repository == 'grindsa/acme2certifier' && (inputs.branch == 'master' || inputs.branch == 'devel' || contains(inputs.branch, 'certifier')) }}
    if: ${{ github.repository == 'grindsa/acme2certifier' && (inputs.branch == 'master' || inputs.branch == 'devel' || contains(inputs.branch, 'wf_')) }}
    steps:
      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: "Parse AWS_CFG JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.AWS_CFG }}

      - name: "Parse NCM_CFG JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.NCM_CFG }}

      - name: "Start AWS instance for testing"
        uses: ./.github/actions/aws_instance_manage
        with:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_INSTANCE_ID: ${{ env.AWS_X64-UB-01_INSTANCE_ID }}
          ACTION: "start"
          IGNORE_CURRENT_STATUS: "false"

      - name: "Sleep for 60s"
        uses: juliangruber/sleep-action@v2.0.4
        with:
          time: 60s

      - name: "Prepare ssh environment in ramdisk"
        run: |
          sudo mkdir -p /tmp/rd
          sudo mount -t tmpfs -o size=5M none /tmp/rd
          sudo echo "$SSH_KEY" > /tmp/rd/ak.tmp
          sudo chmod 600 /tmp/rd/ak.tmp

      - name: "start ncm on remote instance"
        run: |
          ssh -o "StrictHostKeyChecking=no" -i /tmp/rd/ak.tmp ${{ env.SSH_USER }}@${{ env.SSH_HOST }} -p ${{ env.SSH_PORT }} "/usr/local/bin/ncm_mgr.sh start"


  # ---------------------------------------------------------
  # Test container images downloaded from the producer run
  # ---------------------------------------------------------
  test-containers:
    needs: [guard, instance_start]
    runs-on: ubuntu-latest
    if: github.repository == 'grindsa/acme2certifier'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        websrv: ['apache2', 'nginx']
        dbhandler: ['wsgi', 'django']
    steps:

      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: "Parse NCM configuration from JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.NCM_CFG }}

      - name: "Download and import container"
        uses: ./.github/actions/container_load
        with:
          RUN_ID: ${{ inputs.run_id }}
          ARTIFACT_NAME: a2c-${{ inputs.run_id }}.${{ matrix.websrv }}.${{ matrix.dbhandler }}.tar
          DESTINATION_PATH: /tmp
          TOKEN: ${{ secrets.GH_WF_TOKEN }}
          REPO: ${{ github.repository }}

      - name: "Prepare container environment"
        uses: ./.github/actions/container_prep
        with:
          DB_HANDLER: ${{ matrix.dbhandler }}
          WEB_SRV: ${{ matrix.websrv }}
          CONTAINER_BUILD: false

      - name: "Setup tunnel"
        uses: ./.github/actions/wf_specific/certifier_ca_handler/tunnel_setup
        with:
          SSH_USER: ${{ env.SSH_USER }}
          SSH_HOST: ${{ env.SSH_HOST }}
          SSH_PORT: ${{ env.SSH_PORT }}
          SSH_KNOWN_HOSTS: ${{ env.SSH_KNOWN_HOSTS }}
          SSH_KEY: ${{ env.SSH_KEY }}
          NCM_API_HOST: ${{ env.NCM_API_HOST }}
          NCM_API_USER: ${{ env.NCM_API_USER }}
          NCM_API_PASSWORD: ${{ env.NCM_API_PASSWORD }}

      - name: "No profile - Setup a2c with certifier_ca_handler"
        run: |
          sudo cp .github/openssl_ca_handler.py_acme_srv_default_handler.cfg examples/Docker/data/acme_srv.cfg
          sudo chmod 777 examples/Docker/data/acme_srv.cfg
          sudo cp test/ca/certsrv_ca_certs.pem examples/Docker/data/ca_certs.pem
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout:15/g" examples/Docker/data/acme_srv.cfg
          sudo echo "handler_file: examples/ca_handler/certifier_ca_handler.py" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "api_host: $NCM_API_HOST" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_host: https://forwarder.acme:8084" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_bundle: False" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_user: $NCM_API_USER" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_password: $NCM_API_PASSWORD" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_name: $NCM_CA_NAME" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "ca_bundle: $NCM_CA_BUNDLE" >> examples/Docker/data/acme_srv.cfg
          sudo echo "allowed_domainlist: [\"bar.local\", \"*.acme\"]" >> examples/Docker/data/acme_srv.cfg

      - name: "Bring up a2c container"
        uses: ./.github/actions/container_up
        with:
          DB_HANDLER: ${{ matrix.dbhandler }}
          WEB_SRV: ${{ matrix.websrv }}

      - name: "No profile - Enrollment"
        uses: ./.github/actions/wf_specific/certifier_ca_handler/enroll_no_profile

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "Profile 101 - Setup a2c with certifier_ca_handler with profile 101"
        run: |
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout:15/g" examples/Docker/data/acme_srv.cfg
          sudo echo "handler_file: examples/ca_handler/certifier_ca_handler.py" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "api_host: $NCM_API_HOST" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_host: https://forwarder.acme:8084" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_bundle: False" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_user: $NCM_API_USER" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_password: $NCM_API_PASSWORD" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_name: $NCM_CA_NAME" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "ca_bundle: $NCM_CA_BUNDLE" >> examples/Docker/data/acme_srv.cfg
          sudo echo "profile_id: 101" >> examples/Docker/data/acme_srv.cfg
          cd examples/Docker/
          docker compose restart

      - name: "Profile 101 - Enrollment"
        uses: ./.github/actions/wf_specific/certifier_ca_handler/enroll_101_profile

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "Profile 102 - Setup a2c with certifier_ca_handler with Profile 102"
        run: |
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout:15/g" examples/Docker/data/acme_srv.cfg
          sudo echo "handler_file: examples/ca_handler/certifier_ca_handler.py" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "api_host: $NCM_API_HOST" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_host: https://forwarder.acme:8084" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_bundle: False" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_user: $NCM_API_USER" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_password: $NCM_API_PASSWORD" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_name: $NCM_CA_NAME" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "ca_bundle: $NCM_CA_BUNDLE" >> examples/Docker/data/acme_srv.cfg
          sudo echo "profile_id: 102" >> examples/Docker/data/acme_srv.cfg
          cd examples/Docker/
          docker compose restart

      - name: "Profile 102 - Enrollment"
        uses: ./.github/actions/wf_specific/certifier_ca_handler/enroll_102_profile

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "Header-info - Setup a2c with certifier_ca_handler with header-info"
        run: |
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout:15/g" examples/Docker/data/acme_srv.cfg
          sudo echo "handler_file: examples/ca_handler/certifier_ca_handler.py" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "api_host: $NCM_API_HOST" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_host: https://forwarder.acme:8084" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_bundle: False" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_user: $NCM_API_USER" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_password: $NCM_API_PASSWORD" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_name: $NCM_CA_NAME" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "ca_bundle: $NCM_CA_BUNDLE" >> examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/tnauthlist_support: False/tnauthlist_support: False\nheader_info_list: [\"HTTP_USER_AGENT\"]/g" examples/Docker/data/acme_srv.cfg
          cd examples/Docker/
          docker compose restart

      - name: "Header-info - Enrollment"
        uses: ./.github/actions/wf_specific/certifier_ca_handler/enroll_headerinfo

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "EAB without headerinfo - Setup a2c with certifier_ca_handler"
        run: |
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout:15/g" examples/Docker/data/acme_srv.cfg
          sudo echo "handler_file: examples/ca_handler/certifier_ca_handler.py" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "api_host: $NCM_API_HOST" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_host: https://forwarder.acme:8084" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_bundle: False" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_user: $NCM_API_USER" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_password: $NCM_API_PASSWORD" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_name: $NCM_CA_NAME" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "ca_bundle: $NCM_CA_BUNDLE" >> examples/Docker/data/acme_srv.cfg
          sudo echo "profile_id: 100" >> examples/Docker/data/acme_srv.cfg
          sudo echo -e "\n[EABhandler]" >> examples/Docker/data/acme_srv.cfg
          sudo echo "eab_handler_file: /var/www/acme2certifier/examples/eab_handler/kid_profile_handler.py" >> examples/Docker/data/acme_srv.cfg
          sudo echo "key_file: volume/kid_profiles.json" >> examples/Docker/data/acme_srv.cfg
          sudo echo "eab_profiling: True" >> examples/Docker/data/acme_srv.cfg

          sudo cp examples/eab_handler/kid_profiles.json examples/Docker/data/kid_profiles.json
          sudo sed -i '29,33d' examples/Docker/data/kid_profiles.json
          sudo sed -i '20,22d' examples/Docker/data/kid_profiles.json
          sudo chmod 777 examples/eab_handler/kid_profiles.json
          sudo sed -i "s/\"profile_id\"\: \[\"profile_1\", \"profile_2\", \"profile_3\"\]/\"profile_id\"\: \[\"102\", \"101\"\, \"100\"]/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"profile_id\"\: \"profile_2\"/\"profile_id\"\: \"102\"/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"ca_name\": \"example_ca_2\",/\"ca_name\": \"sub-ca-2\"/" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"ca_name\": \"example_ca\",/\"unknown_key\": \"unknown_value\"/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/example.net/acme/g" examples/Docker/data/kid_profiles.json
          sudo sed -i '18,19d' examples/Docker/data/kid_profiles.json
          sudo sed -i '8,9d' examples/Docker/data/kid_profiles.json

          cd examples/Docker/
          docker compose restart

      - name: "EAB without headerinfo - Enrollment"
        uses: ./.github/actions/wf_specific/certifier_ca_handler/enroll_eab_wo_headerinfo

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "EAB with headerinfo - Setup a2c with certifier_ca_handler"
        run: |
          sudo touch examples/Docker/data/acme_srv.cfg
          sudo chmod 777 examples/Docker/data/acme_srv.cfg
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout:15/g" examples/Docker/data/acme_srv.cfg
          sudo echo "handler_file: examples/ca_handler/certifier_ca_handler.py" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "api_host: $NCM_API_HOST" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_host: https://forwarder.acme:8084" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_bundle: False" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_user: $NCM_API_USER" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_password: $NCM_API_PASSWORD" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_name: $NCM_CA_NAME" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "ca_bundle: $NCM_CA_BUNDLE" >> examples/Docker/data/acme_srv.cfg
          sudo echo "profile_id: 100" >> examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/tnauthlist_support: False/tnauthlist_support: False\nheader_info_list: [\"HTTP_USER_AGENT\"]/g" examples/Docker/data/acme_srv.cfg
          sudo echo -e "\n[EABhandler]" >> examples/Docker/data/acme_srv.cfg
          sudo echo "eab_handler_file: /var/www/acme2certifier/examples/eab_handler/kid_profile_handler.py" >> examples/Docker/data/acme_srv.cfg
          sudo echo "key_file: volume/kid_profiles.json" >> examples/Docker/data/acme_srv.cfg
          sudo echo "eab_profiling: True" >> examples/Docker/data/acme_srv.cfg

          sudo cp examples/eab_handler/kid_profiles.json examples/Docker/data/kid_profiles.json
          sudo sed -i '29,33d' examples/Docker/data/kid_profiles.json
          sudo sed -i '20,22d' examples/Docker/data/kid_profiles.json
          sudo chmod 777 examples/eab_handler/kid_profiles.json
          sudo sed -i "s/\"profile_id\"\: \[\"profile_1\", \"profile_2\", \"profile_3\"\]/\"profile_id\"\: \[\"102\", \"101\"\, \"100\"]/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"profile_id\"\: \"profile_2\"/\"profile_id\"\: \"102\"/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"ca_name\": \"example_ca_2\",/\"ca_name\": \"sub-ca-2\"/" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"ca_name\": \"example_ca\",/\"unknown_key\": \"unknown_value\"/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/example.net/acme/g" examples/Docker/data/kid_profiles.json
          sudo sed -i '18,19d' examples/Docker/data/kid_profiles.json
          sudo sed -i '8,9d' examples/Docker/data/kid_profiles.json
          cd examples/Docker/
          docker compose restart

      - name: "EAB with headerinfo - Enrollment"
        uses: ./.github/actions/wf_specific/certifier_ca_handler/enroll_eab_w_headerinfo

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "EAB with headerinfo - Reconfigure key_file without restarting"
        run: |
          sudo sed -i "s/\"allowed_domainlist\": \[\"www.example.com\", \"www.example.org\"\]/\"allowed_domainlist\": \[\"www.example.com\", \"www.example.org\", \"*.acme\"\]/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/      \"prevalidated_domainlist\": \[\"www.example.com\"\]/          \"prevalidated_domainlist\": \[\"www.example1.com\"\]\n  },\n  \"keyid_04\": {\n    \"hmac\": \"YW5kX2hlcmVfaXNfYW5vdGhlcl92ZXJ5X2xvbmdfbWFja19obWFjX2tleV90b19jaGVja19pZl9jaGFuZ2VzX2FmZmVjdF9pbW1lZGF0ZWx5\",\n    \"cahandler\": {}\n  }\n}/g" examples/Docker/data/kid_profiles.json
          sudo sed -i '34,35d' examples/Docker/data/kid_profiles.json

      - name: "EAB with headerinfo - Enrollment after reconfiguration"
        uses: ./.github/actions/wf_specific/certifier_ca_handler/enroll_eab_w_headerinfo
        with:
          RECONFIGURE: true

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "kid-file in yaml format - Reconfiguration"
        run: |
          sudo sed -i "s/kid_profiles.json/kid_profiles.yml/g" examples/Docker/data/acme_srv.cfg
          sudo pip3 install yq
          sudo pip3 install jq
          sudo sh -c "cat examples/Docker/data/kid_profiles.json | yq -y '.' > examples/Docker/data/kid_profiles.yml"
          sudo rm examples/Docker/data/kid_profiles.json
          sudo sed -i '33,34d' examples/Docker/data/kid_profiles.yml
          # sudo cat examples/Docker/data/kid_profiles.yml

      - name: "kid-file in yaml format - Enrollment after reconfiguration"
        uses: ./.github/actions/wf_specific/certifier_ca_handler/enroll_eab_w_headerinfo
        with:
          RECONFIGURE: true

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "ACME Profile - Setup a2c with certifier_ca_handler"
        run: |
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout:15/g" examples/Docker/data/acme_srv.cfg
          sudo echo "handler_file: examples/ca_handler/certifier_ca_handler.py" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "api_host: $NCM_API_HOST" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_host: https://forwarder.acme:8084" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_bundle: False" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_user: $NCM_API_USER" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_password: $NCM_API_PASSWORD" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_name: $NCM_CA_NAME" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "ca_bundle: $NCM_CA_BUNDLE" >> examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/tnauthlist_support: False/tnauthlist_support: False\nprofiles={\"101\": \"http:\/\/foo.bar\/profile1\", \"102\": \"http:\/\/foo.bar\/profile2\", \"profile3\": \"http:\/\/foo.bar\/profile3\"}/g" examples/Docker/data/acme_srv.cfg
          sudo echo "enrollment_config_log: True" >> examples/Docker/data/acme_srv.cfg
          cd examples/Docker/
          docker compose restart

      - name: "ACME Profile - Enrollment"
        uses: ./.github/actions/wf_specific/certifier_ca_handler/enroll_acmeprofile

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "EAB ACME Profile - Setup a2c with certifier_ca_handler"
        run: |
          sudo touch examples/Docker/data/acme_srv.cfg
          sudo chmod 777 examples/Docker/data/acme_srv.cfg
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout:15/g" examples/Docker/data/acme_srv.cfg
          sudo echo "handler_file: examples/ca_handler/certifier_ca_handler.py" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "api_host: $NCM_API_HOST" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_host: https://forwarder.acme:8084" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_bundle: False" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_user: $NCM_API_USER" >> examples/Docker/data/acme_srv.cfg
          sudo echo "api_password: $NCM_API_PASSWORD" >> examples/Docker/data/acme_srv.cfg
          sudo echo "ca_name: $NCM_CA_NAME" >> examples/Docker/data/acme_srv.cfg
          # sudo echo "ca_bundle: $NCM_CA_BUNDLE" >> examples/Docker/data/acme_srv.cfg
          sudo echo "profile_id: 100" >> examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/tnauthlist_support: False/tnauthlist_support: False\nprofiles={\"101\": \"http:\/\/foo.bar\/profile1\", \"102\": \"http:\/\/foo.bar\/profile2\", \"profile3\": \"http:\/\/foo.bar\/profile3\"}/g" examples/Docker/data/acme_srv.cfg
          sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\ncert_operations_log: True/g" examples/Docker/data/acme_srv.cfg
          sudo echo "enrollment_config_log: True" >> examples/Docker/data/acme_srv.cfg
          sudo echo -e "\n[EABhandler]" >> examples/Docker/data/acme_srv.cfg
          sudo echo "eab_handler_file: /var/www/acme2certifier/examples/eab_handler/kid_profile_handler.py" >> examples/Docker/data/acme_srv.cfg
          sudo echo "key_file: volume/kid_profiles.json" >> examples/Docker/data/acme_srv.cfg
          sudo echo "eab_profiling: True" >> examples/Docker/data/acme_srv.cfg

          sudo cp examples/eab_handler/kid_profiles.json examples/Docker/data/kid_profiles.json
          sudo sed -i '29,33d' examples/Docker/data/kid_profiles.json
          sudo sed -i '20,22d' examples/Docker/data/kid_profiles.json
          sudo chmod 777 examples/eab_handler/kid_profiles.json
          sudo sed -i "s/\"profile_id\"\: \[\"profile_1\", \"profile_2\", \"profile_3\"\]/\"profile_id\"\: \[\"102\", \"101\"\, \"100\"]/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"profile_id\"\: \"profile_2\"/\"profile_id\"\: \"102\"/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"ca_name\": \"example_ca_2\",/\"ca_name\": \"sub-ca-2\"/" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/\"ca_name\": \"example_ca\",/\"unknown_key\": \"unknown_value\"/g" examples/Docker/data/kid_profiles.json
          sudo sed -i "s/example.net/acme/g" examples/Docker/data/kid_profiles.json
          sudo sed -i '18,19d' examples/Docker/data/kid_profiles.json
          sudo sed -i '8,9d' examples/Docker/data/kid_profiles.json
          cd examples/Docker/
          docker compose restart

      - name: "EAB ACME Profile - Enrollment"
        uses: ./.github/actions/wf_specific/certifier_ca_handler/enroll_eab_w_acmeprofile
        with:
          DEPLOYMENT_TYPE: container

      - name: "Check container configuration"
        uses: ./.github/actions/container_check
        with:
          DB_HANDLER: ${{ matrix.dbhandler }}
          WEB_SRV: ${{ matrix.websrv }}

      - name: "Flush logs"
        uses: ./.github/actions/logs_flush
        with:
          DEPLOYMENT_TYPE: container

      - name: "[ * ] Collecting test logs"
        if: ${{ failure() }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/upload
          sudo cp -rp examples/Docker/data/ ${{ github.workspace }}/artifact/data/
          sudo cp -rp acme-sh/ ${{ github.workspace }}/artifact/acme-sh/
          sudo cp -rp certbot/ ${{ github.workspace }}/artifact/certbot/
          sudo cp -rp lego/ ${{ github.workspace }}/artifact/lego/
          cd examples/Docker
          docker compose logs > ${{ github.workspace }}/artifact/docker-compose.log
          sudo tar -C ${{ github.workspace }}/artifact/ -cvzf ${{ github.workspace }}/artifact/upload/artifact.tar.gz docker-compose.log data acme-sh certbot lego

      - name: "[ * ] Uploading artifacts"
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: test-containers-${{ matrix.websrv }}-${{ matrix.dbhandler }}.tar.gz
          path: ${{ github.workspace }}/artifact/upload/

  # ---------------------------------------------------------
  # Test RPMs (EL8 & EL9) downloaded from the producer run
  # ---------------------------------------------------------
  test-rpm:
    needs: [guard, instance_start]
    runs-on: ubuntu-latest
    if: github.repository == 'grindsa/acme2certifier'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        rhversion: [8, 9]
        execscript: ['rpm_tester.sh', 'django_tester.sh']

    steps:

      - name: "checkout GIT"
        uses: actions/checkout@v6

      - name: Parse GitHub secrets from JSON
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.GH_CFG }}

      - name: "Parse NCM configuration from JSON secret"
        uses: ./.github/actions/parse-json-secret
        with:
          json_secret: ${{ secrets.NCM_CFG }}

      - name: "Prepare Alma environment"
        uses: ./.github/actions/rpm_prep
        with:
          GH_USER: ${{ env.GH_USER }}
          GH_SBOM_REPO_TOKEN: ${{ env.GH_SBOM_REPO_TOKEN }}
          RH_VERSION: ${{ matrix.rhversion }}

      - name: "Setup tunnel"
        uses: ./.github/actions/wf_specific/certifier_ca_handler/tunnel_setup
        with:
          SSH_USER: ${{ env.SSH_USER }}
          SSH_HOST: ${{ env.SSH_HOST }}
          SSH_PORT: ${{ env.SSH_PORT }}
          SSH_KNOWN_HOSTS: ${{ env.SSH_KNOWN_HOSTS }}
          SSH_KEY: ${{ env.SSH_KEY }}
          NCM_API_HOST: ${{ env.NCM_API_HOST }}
          NCM_API_USER: ${{ env.NCM_API_USER }}
          NCM_API_PASSWORD: ${{ env.NCM_API_PASSWORD }}

      - name: "No profile - Setup a2c with certifier_ca_handler"
        run: |
          mkdir -p data/volume/acme_ca
          sudo cp test/ca/certsrv_ca_certs.pem data/volume/acme_ca/ca_certs.pem
          sudo touch data/volume/acme_srv.cfg
          sudo chmod 777 data/volume/acme_srv.cfg
          sudo head -n -8 .github/openssl_ca_handler.py_acme_srv_default_handler.cfg > data/volume/acme_srv.cfg
          sudo sed -i "s/revocation_reason_check_disable: False/revocation_reason_check_disable: False\nenrollment_timeout:15/g" data/volume/acme_srv.cfg
          sudo echo "handler_file: examples/ca_handler/certifier_ca_handler.py" >> data/volume/acme_srv.cfg
          # sudo echo "api_host: $NCM_API_HOST" >> data/volume/acme_srv.cfg
          sudo echo "api_host: https://forwarder.acme:8084" >> data/volume/acme_srv.cfg
          sudo echo "ca_bundle: False" >> data/volume/acme_srv.cfg
          sudo echo "api_user: $NCM_API_USER" >> data/volume/acme_srv.cfg
          sudo echo "api_password: $NCM_API_PASSWORD" >> data/volume/acme_srv.cfg
          sudo echo "ca_name: $NCM_CA_NAME" >> data/volume/acme_srv.cfg
